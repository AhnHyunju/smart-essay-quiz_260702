<!DOCTYPE html>
<html lang="ko">

<head>
      <meta charset="UTF-8">
      <title>교사용 실시간 모니터링 시스템</title>
      <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
      <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
      <style>
            body {
                  font-family: 'Arial', sans-serif;
                  background-color: #f1f5f9;
                  padding: 20px;
            }

            .monitor-box {
                  max-width: 1200px;
                  margin: 0 auto;
                  background: white;
                  padding: 25px;
                  border-radius: 12px;
                  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            }

            h2 {
                  color: #1e3a8a;
                  border-bottom: 2px solid #e2e8f0;
                  padding-bottom: 10px;
            }

            table {
                  width: 100%;
                  border-collapse: collapse;
                  margin-top: 20px;
            }

            th,
            td {
                  padding: 12px;
                  border: 1px solid #cbd5e1;
                  text-align: center;
            }

            th {
                  background-color: #f8fafc;
                  color: #334155;
            }

            .badge-wait {
                  background: #fef3c7;
                  color: #d97706;
                  padding: 4px 8px;
                  border-radius: 4px;
                  font-size: 12px;
            }
      </style>
</head>

<body>
      <div class="monitor-box">
            <h2>🖥️ 실시간 AI 채점 및 서술형 모니터링 현황 (<span id="subj">과목</span>)</h2>
            <table>
                  <thead>
                        <tr>
                              <th>학년</th>
                              <th>반</th>
                              <th>번호</th>
                              <th>이름</th>
                              <th>제출한 서술형 답안 내용</th>
                              <th>AI 채점 현황</th>
                              <th>점수</th>
                              <th>Gemini 맞춤 피드백</th>
                        </tr>
                  </thead>
                  <tbody id="data-list"></tbody>
            </table>
      </div>

      <script>
            const firebaseConfig = {
                  apiKey: "AIzaSyA74CrVcE1oSf2BZFFdf87fyCn3PkKO7yg",
                  authDomain: "homework-monitor.firebaseapp.com",
                  databaseURL: "https://homework-monitor-default-rtdb.firebaseio.com",
                  projectId: "homework-monitor",
                  storageBucket: "homework-monitor.appspot.com"
            };
            firebase.initializeApp(firebaseConfig);
            const database = firebase.database();

            const urlParams = new URLSearchParams(window.location.search);
            const subj = urlParams.get('subject') || '통합사회';
            document.getElementById('subj').innerText = subj;

            database.ref('evaluations').on('value', (snapshot) => {
                  const tbody = document.getElementById('data-list');
                  tbody.innerHTML = "";

                  snapshot.forEach((childSnapshot) => {
                        const data = childSnapshot.val();
                        if (data.subject === subj) {
                              const tr = document.createElement('tr');
                              tr.innerHTML = `
                    <td><strong>${data.grade}학년</strong></td>
                    <td>${data.class}</td>
                    <td>${data.number}번</td>
                    <td>${data.name}</td>
                    <td style="text-align:left; max-width:300px;">${data.answer}</td>
                    <td><span class="badge-wait">${data.status}</span></td>
                    <td style="color:#b91c1c; font-weight:bold;">${data.score}</td>
                    <td style="text-align:left; font-size:13px; color:#475569;">${data.feedback}</td>
                `;
                              tbody.appendChild(tr);
                        }
                  });
            });
      </script>
</body>

</html>
