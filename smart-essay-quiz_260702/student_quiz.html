<!DOCTYPE html>
<html lang="ko">

<head>
      <meta charset="UTF-8">
      <title>AI 서술형 평가 연습 창</title>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
      <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
      <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
      <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
      <style>
            body {
                  font-family: 'Arial', sans-serif;
                  background-color: #f1f5f9;
                  margin: 0;
                  padding: 20px;
                  display: flex;
                  justify-content: center;
                  min-height: 100vh;
            }

            .quiz-wrapper {
                  max-width: 1280px;
                  width: 100%;
                  background: white;
                  padding: 30px;
                  border-radius: 16px;
                  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            }

            .header-box {
                  display: flex;
                  justify-content: space-between;
                  align-items: center;
                  border-bottom: 2px solid #e2e8f0;
                  padding-bottom: 10px;
                  margin-bottom: 20px;
            }

            .main-layout {
                  display: flex;
                  gap: 25px;
            }

            .guide-container {
                  flex: 1;
                  background: #f8fafc;
                  padding: 20px;
                  border-radius: 12px;
                  border: 1px solid #e2e8f0;
            }

            .final-container {
                  flex: 1;
                  background: #ffffff;
                  padding: 20px;
                  border-radius: 12px;
                  border: 1px solid #cbd5e1;
                  display: flex;
                  flex-direction: column;
            }

            .student-info-grid {
                  display: grid;
                  grid-template-columns: repeat(4, 1fr);
                  gap: 10px;
                  margin-bottom: 15px;
            }

            .input-label {
                  font-weight: bold;
                  color: #334155;
                  display: block;
                  margin-bottom: 5px;
                  font-size: 14px;
            }

            .input-field,
            .info-input {
                  width: 100%;
                  padding: 10px;
                  border: 1px solid #cbd5e1;
                  border-radius: 6px;
                  box-sizing: border-box;
                  font-size: 14px;
            }

            .info-input {
                  margin-bottom: 10px;
            }

            .connector-badge {
                  display: inline-block;
                  background: #e0f2fe;
                  color: #0369a1;
                  padding: 6px 12px;
                  border-radius: 20px;
                  font-size: 13px;
                  font-weight: bold;
                  margin: 4px;
                  cursor: pointer;
                  border: 1px solid #bae6fd;
            }

            .connector-badge:hover {
                  background: #0284c7;
                  color: white;
            }

            .final-textarea {
                  width: 100%;
                  height: 200px;
                  padding: 12px;
                  border-radius: 8px;
                  border: 1px solid #94a3b8;
                  resize: none;
                  box-sizing: border-box;
                  font-size: 15px;
                  margin-bottom: 15px;
            }

            .submit-btn,
            .action-btn {
                  background-color: #1e3a8a;
                  color: white;
                  border: none;
                  padding: 14px;
                  border-radius: 8px;
                  font-size: 16px;
                  font-weight: bold;
                  cursor: pointer;
                  width: 100%;
            }

            .submit-btn:hover {
                  background-color: #172554;
            }

            .auth-panel {
                  text-align: center;
                  padding: 40px 20px;
            }

            .hidden {
                  display: none !important;
            }

            .modal {
                  position: fixed;
                  top: 0;
                  left: 0;
                  width: 100%;
                  height: 100%;
                  background: rgba(0, 0, 0, 0.5);
                  display: flex;
                  justify-content: center;
                  align-items: center;
                  z-index: 1000;
            }

            .modal-content {
                  background: white;
                  padding: 25px;
                  border-radius: 12px;
                  max-width: 600px;
                  width: 100%;
                  max-height: 80vh;
                  overflow-y: auto;
            }

            .standard-btn {
                  background-color: #10b981;
                  margin-bottom: 15px;
            }
      </style>
</head>

<body>

      <div class="quiz-wrapper">
            <div id="login-section" class="auth-panel">
                  <h2 style="color:#1e3a8a;"><i class="fa-solid fa-lock"></i> 학생 본인 확인 인증</h2>
                  <p>서술형 시험실에 입장하기 위해 구글 로그인을 진행해 주세요.</p>
                  <button class="submit-btn" style="max-width:300px; margin-top:20px;" onclick="googleLogin()"><i
                              class="fa-brands fa-google"></i> Google 계정으로 로그인</button>
            </div>

            <div id="quiz-section" class="hidden">
                  <div class="header-box">
                        <h2 style="margin:0; color:#1e3a8a;"><i class="fa-solid fa-graduation-cap"></i> AI 서술형 평가실
                              (<span id="subject-display">과목</span>)</h2>
                        <button class="action-btn standard-btn" style="width:auto; padding:8px 15px;"
                              onclick="openModal()"><i class="fa-solid fa-bookmark"></i> 성취기준/수준 보기</button>
                  </div>

                  <div class="student-info-grid">
                        <div>
                              <label class="input-label">학년</label>
                              <input type="number" id="s-grade" class="info-input" placeholder="예: 1">
                        </div>
                        <div>
                              <label class="input-label">학과 / 반</label>
                              <input type="text" id="s-class" class="info-input" placeholder="예: 3반">
                        </div>
                        <div>
                              <label class="input-label">번호</label>
                              <input type="number" id="s-number" class="info-input" placeholder="예: 15">
                        </div>
                        <div>
                              <label class="input-label">이름</label>
                              <input type="text" id="s-name" class="info-input" readonly>
                        </div>
                  </div>

                  <div class="main-layout">
                        <div class="guide-container">
                              <h3 style="margin-top:0; color:#0f172a;"><i class="fa-solid fa-lightbulb"
                                          style="color:#eab308;"></i> 단계별 생각 가이드</h3>

                              <label class="input-label">1단계: 핵심 주장 및 결론 적기</label>
                              <input type="text" id="step1" class="input-field" placeholder="핵심 주장을 한 문장으로 적으세요."
                                    oninput="autoCombine()">

                              <label class="input-label">2단계: 근거 및 구체적 예시 뒷받침</label>
                              <input type="text" id="step2" class="input-field" placeholder="왜 그렇게 생각하는지 근거를 적으세요."
                                    oninput="autoCombine()">

                              <div
                                    style="background:#eff6ff; padding:15px; border-radius:8px; border:1px solid #bfdbfe; margin-top:20px;">
                                    <h4 style="margin-top:0; color:#1e40af;"><i
                                                class="fa-solid fa-wand-magic-sparkles"></i> 추천 연결어 힌트</h4>
                                    <div id="connectors">
                                          <span class="connector-badge" onclick="addConnector('왜냐하면')">왜냐하면</span>
                                          <span class="connector-badge" onclick="addConnector('예를 들어')">예를 들어</span>
                                          <span class="connector-badge" onclick="addConnector('반면에')">반면에</span>
                                          <span class="connector-badge" onclick="addConnector('따라서')">따라서</span>
                                          <span class="connector-badge" onclick="addConnector('그 결과,')">그 결과,</span>
                                    </div>
                              </div>
                        </div>

                        <div class="final-container">
                              <h3 style="margin-top:0; color:#0f172a;"><i class="fa-solid fa-file-pen"
                                          style="color:#2563eb;"></i> 최종 답안 제출란</h3>
                              <div style="background:#f1f5f9; padding:12px; border-radius:6px; font-weight:bold; margin-bottom:15px;"
                                    id="question-text">
                                    [문항] 과목 정보를 불러오는 중입니다...
                              </div>
                              <textarea id="student-answer" class="final-textarea"
                                    placeholder="1단계와 2단계 내용이 이곳에 실시간으로 결합됩니다. 문맥에 맞게 최종 수정해 주세요..."></textarea>
                              <button class="submit-btn" onclick="submitFinalAnswer()"><i
                                          class="fa-solid fa-paper-plane"></i> 최종 답안 제출하기</button>
                        </div>
                  </div>
            </div>
      </div>

      <div id="standard-modal" class="modal hidden">
            <div class="modal-content">
                  <h3 style="color:#1e3a8a; margin-top:0;" id="modal-title">🎯 과목 교육과정 안내</h3>
                  <div id="modal-body" style="line-height:1.6; font-size:14px; color:#334155;"></div>
                  <button class="action-btn" style="margin-top:20px; background:#64748b;"
                        onclick="closeModal()">닫기</button>
            </div>
      </div>

      <script>
            const firebaseConfig = {
                  apiKey: "AIzaSyA74CrVcE1oSf2BZFFdf87fyCn3PkKO7yg",
                  authDomain: "homework-monitor.firebaseapp.com",
                  databaseURL: "https://homework-monitor-default-rtdb.firebaseio.com",
                  projectId: "homework-monitor",
                  storageBucket: "homework-monitor.appspot.com"
            };
            firebase.initializeApp(firebaseConfig);
            const auth = firebase.auth();
            const database = firebase.database();

            const urlParams = new URLSearchParams(window.location.search);
            const currentSubject = urlParams.get('subject') || '통합사회';
            document.getElementById('subject-display').innerText = currentSubject;

            if (currentSubject === '통합사회') {
                  document.getElementById('question-text').innerText = "[문항] 정보 사회의 확산에 따라 나타날 수 있는 긍정적 측면과 부정적 측면에 대해 각각 한 가지씩 서술하시오.";
            } else {
                  document.getElementById('question-text').innerText = "[문항] 현대 사회의 문화 변동의 원인을 내부적 요인과 외부적 요인으로 구분하여 논하시오.";
            }

            function googleLogin() {
                  const provider = new firebase.auth.GoogleAuthProvider();
                  auth.signInWithPopup(provider).then((result) => {
                        document.getElementById('login-section').classList.add('hidden');
                        document.getElementById('quiz-section').classList.remove('hidden');
                        document.getElementById('s-name').value = result.user.displayName;
                  }).catch(err => alert("로그인 오류: " + err.message));
            }

            function autoCombine() {
                  const s1 = document.getElementById('step1').value;
                  const s2 = document.getElementById('step2').value;
                  let combined = "";
                  if (s1) combined += s1;
                  if (s2) combined += (s1 ? " 왜냐하면 " : "") + s2;
                  document.getElementById('student-answer').value = combined;
            }

            function addConnector(word) {
                  const txt = document.getElementById('student-answer');
                  txt.value += (txt.value ? " " : "") + word + " ";
                  txt.focus();
            }

            function openModal() {
                  document.getElementById('standard-modal').classList.remove('hidden');
                  const body = document.getElementById('modal-body');
                  if (currentSubject === '통합사회') {
                        body.innerHTML = `
                <p><strong>[성취기준]</strong> 10통사09-02: 미래 사회가 인류의 삶에 미칠 영향을 예측하고, 대처 자세를 탐구한다.</p>
                <hr>
                <p><strong>[성취수준 A]:</strong> 미래 사회의 긍정적/부정적 모습을 다각적으로 탐색하고 논리적 근거와 실천적 대안을 훌륭히 제시함.</p>
                <p><strong>[성취수준 C]:</strong> 미래 사회의 보편적 특징을 알고 관련 현상을 매칭하여 설명할 수 있음.</p>
            `;
                  } else {
                        body.innerHTML = `
                <p><strong>[성취기준]</strong> 12사문04-01: 문화 변동의 다양한 원인과 양상을 파악하고 이해한다.</p>
                <hr>
                <p><strong>[성취수준 A]:</strong> 내재적 원인과 외재적 원인을 명확히 구분하고 문화 융합 사례를 입체적으로 분석함.</p>
            `;
                  }
            }
            function closeModal() { document.getElementById('standard-modal').classList.add('hidden'); }

            function submitFinalAnswer() {
                  const grade = document.getElementById('s-grade').value;
                  const sClass = document.getElementById('s-class').value;
                  const num = document.getElementById('s-number').value;
                  const name = document.getElementById('s-name').value;
                  const answer = document.getElementById('student-answer').value;

                  if (!grade || !sClass || !num) { alert("학년, 반, 번호를 모두 입력해 주세요!"); return; }

                  const studentKey = name + "_" + num;
                  database.ref('evaluations/' + studentKey).set({
                        grade: grade,
                        class: sClass,
                        number: num,
                        name: name,
                        subject: currentSubject,
                        answer: answer,
                        status: "채점대기",
                        score: "계산중...",
                        feedback: "인공지능 교사가 서술형 내용을 분석하고 있습니다."
                  }).then(() => {
                        alert("서술형 답안 제출 완료! 선생님 모니터로 전송되었습니다.");
                  });
            }
      </script>
</body>

</html>
