<!DOCTYPE html>
<html lang="ko">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>AI 서술형 평가 시스템</title>
      <style>
            body {
                  font-family: 'Arial', sans-serif;
                  background-color: #f1f5f9;
                  display: flex;
                  justify-content: center;
                  align-items: center;
                  height: 100vh;
                  margin: 0;
            }

            .main-container {
                  background: white;
                  padding: 40px;
                  border-radius: 16px;
                  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
                  text-align: center;
                  max-width: 450px;
                  width: 100%;
            }

            h1 {
                  color: #1e293b;
                  margin-bottom: 30px;
                  font-size: 28px;
            }

            .btn {
                  display: block;
                  width: 100%;
                  padding: 16px;
                  margin: 12px 0;
                  font-size: 18px;
                  font-weight: bold;
                  color: white;
                  background-color: #1e3a8a;
                  border: none;
                  border-radius: 8px;
                  text-decoration: none;
                  box-sizing: border-box;
                  transition: background 0.2s;
                  text-align: center;
            }

            .btn:hover {
                  background-color: #172554;
            }

            .btn-teacher {
                  background-color: #475569;
            }

            .btn-teacher:hover {
                  background-color: #334155;
            }
      </style>
</head>

<body>
      <div class="main-container">
            <h1>📝 AI 서술형 평가 시스템</h1>
            <a href="subject_home.html?role=student" class="btn">✏️ 학생용 시험 치러 가기</a>
            <a href="subject_home.html?role=teacher" class="btn btn-teacher">🖥️ 교사용 모니터링 가기</a>
      </div>
</body>

</html>
