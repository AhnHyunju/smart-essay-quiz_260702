<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교사용 실시간 모니터링 시스템</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f1f5f9;
            padding: 20px;
        }

        .monitor-box {
            max-width: 1300px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        h2 {
            color: #1e3a8a;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
            margin-top: 0;
        }

        .summary-bar {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 14px;
            color: #475569;
            margin-top: 10px;
        }

        .summary-bar strong {
            color: #1e3a8a;
        }

        .summary-bar .alert-count strong {
            color: #dc2626;
        }

        /* ── AI 채점 제어판 ── */
        .grading-panel {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px 14px;
            margin-top: 14px;
        }

        .grading-panel label {
            font-size: 13px;
            color: #334155;
            font-weight: bold;
        }

        .api-key-input {
            flex: 1;
            min-width: 220px;
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 13px;
        }

        .panel-btn {
            border: none;
            border-radius: 6px;
            padding: 9px 14px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            background: #1e3a8a;
        }

        .panel-btn:hover:not(:disabled) {
            background: #172554;
        }

        .panel-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .panel-btn.grade {
            background: #7c3aed;
        }

        .panel-btn.grade:hover:not(:disabled) {
            background: #6d28d9;
        }

        .auto-grade-label {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            color: #334155;
        }

        .grading-status {
            font-size: 13px;
            color: #7c3aed;
            font-weight: bold;
            width: 100%;
        }

        .login-note {
            font-size: 12px;
            color: #b45309;
            width: 100%;
        }

        .q-item {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .q-item .q-no {
            font-size: 13px;
            font-weight: bold;
            color: #1e3a8a;
            padding-top: 9px;
            white-space: nowrap;
        }

        .q-item textarea {
            flex: 1;
            min-height: 44px;
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            resize: vertical;
            box-sizing: border-box;
        }

        .table-scroll {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            min-width: 1000px;
            table-layout: fixed;   /* 열 너비를 지정한 대로 고정 */
        }

        /* 학년·반·번호는 같은 좁은 폭, 답안 칸이 남는 공간을 모두 사용 */
        th:nth-child(1),
        th:nth-child(2),
        th:nth-child(3) {
            width: 64px;
        }

        th:nth-child(4) {
            width: 84px;
        }

        th:nth-child(5) {
            width: 122px;
        }

        th:nth-child(7) {
            width: 118px;
        }

        th:nth-child(8) {
            width: 92px;
        }

        th:nth-child(9) {
            width: 250px;
        }

        th,
        td {
            padding: 10px 6px;
            border: 1px solid #cbd5e1;
            text-align: center;
            font-size: 14px;
            word-break: break-word;
        }

        th {
            background-color: #f8fafc;
            color: #334155;
        }

        tr.row-away {
            background-color: #fef2f2;
        }

        .answer-cell {
            text-align: left;
            max-width: 300px;
            word-break: break-word;
        }

        .feedback-cell {
            text-align: left;
            font-size: 13px;
            color: #475569;
            max-width: 260px;
            white-space: pre-line;   /* 1./2./3. 항목이 줄바꿈되어 보이도록 */
        }

        .score-cell {
            color: #b91c1c;
            font-weight: bold;
            white-space: nowrap;
        }

        .level-badge {
            display: inline-block;
            background: #ede9fe;
            color: #6d28d9;
            border-radius: 6px;
            padding: 2px 7px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 4px;
        }

        .badge-wait {
            background: #fef3c7;
            color: #d97706;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .badge-done {
            background: #dcfce7;
            color: #15803d;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .badge-fail {
            background: #fee2e2;
            color: #b91c1c;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .badge-none {
            background: #f1f5f9;
            color: #64748b;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        /* 보기 필터 */
        .filter-select {
            padding: 7px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 13px;
            margin-left: 4px;
        }

        /* 접속 종료 버튼 */
        .end-session-btn {
            margin-top: 5px;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 4px 9px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .end-session-btn:hover {
            background: #991b1b;
        }

        /* 개별 채점 메뉴 */
        .grade-menu-toggle {
            margin-top: 6px;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 5px;
            padding: 3px 8px;
            font-size: 12px;
            color: #334155;
            cursor: pointer;
        }

        .grade-menu-toggle:hover {
            background: #eff6ff;
        }

        .mini-grade-btn {
            display: block;
            width: 100%;
            margin-top: 4px;
            background: #7c3aed;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 8px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .mini-grade-btn.regrade {
            background: #c2410c;
        }

        .mini-grade-btn.record {
            background: #0d9488;
        }

        .mini-grade-btn:hover {
            opacity: 0.85;
        }

        /* 문항별 답안 토글 */
        .q-answer-toggle {
            display: block;
            width: 100%;
            text-align: left;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 6px 10px;
            margin: 3px 0;
            font-size: 13px;
            font-weight: bold;
            color: #1e3a8a;
            cursor: pointer;
        }

        .q-answer-toggle:hover {
            background: #eff6ff;
        }

        .q-answer-toggle.open {
            background: #eff6ff;
            border-color: #93c5fd;
        }

        .q-answer-body {
            text-align: left;
            font-size: 13px;
            color: #334155;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-top: none;
            border-radius: 0 0 6px 6px;
            padding: 8px 10px;
            margin: -3px 0 4px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .attempt-badge {
            display: inline-block;
            background: #eff6ff;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
            border-radius: 10px;
            padding: 3px 9px;
            font-size: 11px;
            font-weight: bold;
            margin-top: 5px;
            cursor: pointer;
        }

        .attempt-badge:hover {
            background: #1d4ed8;
            color: white;
        }

        .status-light {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
        }

        .light-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .light-active .light-dot {
            background: #22c55e;
        }

        .light-active {
            color: #15803d;
        }

        .light-away .light-dot {
            background: #dc2626;
            animation: pulse-red 0.8s infinite;
            box-shadow: 0 0 6px rgba(220, 38, 38, 0.7);
        }

        .light-away {
            color: #b91c1c;
        }

        .light-offline .light-dot {
            background: #94a3b8;
        }

        .light-offline {
            color: #64748b;
        }

        @keyframes pulse-red {
            50% {
                opacity: 0.25;
            }
        }

        .away-count-text {
            font-size: 11px;
            color: #b91c1c;
            display: block;
            margin-top: 3px;
        }

        /* 누적 이탈 5회 이상: 눈에 띄게 강조 */
        .away-count-text.high {
            font-size: 12px;
            font-weight: bold;
            color: #ffffff;
            background: #dc2626;
            border-radius: 6px;
            padding: 2px 6px;
            display: inline-block;
        }

        .empty-row td {
            color: #94a3b8;
            padding: 30px;
        }

        /* ── 이력 모달 ── */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 16px;
        }

        .modal.open {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 12px;
            max-width: 640px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            color: #1e3a8a;
            margin-top: 0;
        }

        .history-item {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
            background: #f8fafc;
        }

        .history-item .h-meta {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 6px;
        }

        .history-item .h-answer {
            font-size: 14px;
            color: #0f172a;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .history-item .h-result {
            margin-top: 8px;
            font-size: 13px;
            color: #475569;
            border-top: 1px dashed #cbd5e1;
            padding-top: 8px;
            white-space: pre-line;   /* 1./2./3. 항목 줄바꿈 표시 */
        }

        .close-btn {
            background: #64748b;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 6px;
        }
    </style>
</head>

<body>
    <div class="monitor-box">
        <h2>🖥️ 실시간 AI 채점 및 서술형 모니터링 현황 (<span id="subj">과목</span>)</h2>
        <div class="summary-bar">
            <span>👥 접속/제출 인원: <strong id="total-count">0</strong>명</span>
            <span>📨 답안 제출: <strong id="submitted-count">0</strong>명</span>
            <span class="alert-count">🚨 지금 이탈 중: <strong id="away-now-count">0</strong>명</span>
            <span class="alert-count">⚠️ 이탈 기록 있음: <strong id="away-history-count">0</strong>명</span>
            <span>⏳ 채점 대기: <strong id="pending-count">0</strong>건</span>
        </div>

        <!-- 보기 필터 패널 -->
        <div class="grading-panel" style="border-color:#bbf7d0; background:#f0fdf4;">
            <label>🔎 보기 필터:</label>
            <label style="font-weight:normal;">학년
                <select id="filter-grade" class="filter-select">
                    <option value="">전체</option>
                    <option value="1">1학년</option>
                    <option value="2">2학년</option>
                </select>
            </label>
            <label style="font-weight:normal;">반
                <select id="filter-class" class="filter-select">
                    <option value="">전체</option>
                    <option value="1">1반</option>
                    <option value="2">2반</option>
                    <option value="3">3반</option>
                    <option value="4">4반</option>
                    <option value="5">5반</option>
                    <option value="6">6반</option>
                    <option value="7">7반</option>
                </select>
            </label>
            <button class="panel-btn" id="filter-reset-btn" style="background:#64748b;">전체 보기</button>
            <span class="grading-status" id="filter-status"></span>
        </div>

        <!-- 문항 관리 패널 -->
        <div class="grading-panel" style="border-color:#bfdbfe; background:#eff6ff;">
            <label>📝 문항 관리:</label>
            <label style="font-weight:normal;">문항 수
                <select id="q-count" style="padding:7px; border:1px solid #cbd5e1; border-radius:6px; font-size:13px; margin-left:4px;"></select>
            </label>
            <button class="panel-btn" id="q-toggle-btn">문항 입력란 열기 ▾</button>
            <button class="panel-btn" id="q-save-btn" style="background:#0891b2;">💾 문항 저장 (학생 화면에 반영)</button>
            <button class="panel-btn" id="q-reset-btn" style="background:#64748b;">기본 예시로 되돌리기</button>
            <span class="grading-status" id="q-status"></span>
            <div id="q-editor" style="display:none; width:100%; margin-top:8px;"></div>
        </div>

        <!-- 시험 모드(이탈 감지) 패널 -->
        <div class="grading-panel" style="border-color:#fecaca; background:#fef2f2;">
            <label>🛡️ 시험 모드:</label>
            <button class="panel-btn" id="mode-btn" style="background:#dc2626;">불러오는 중...</button>
            <span class="grading-status" id="mode-desc"></span>
        </div>

        <!-- AI 채점 제어판 -->
        <div class="grading-panel">
            <label>🤖 Gemini AI 채점 <span style="font-weight:normal; font-size:12px;">(교사별 개인 키)</span>:</label>
            <input type="password" id="api-key" class="api-key-input"
                placeholder="본인의 Gemini API 키를 붙여넣으세요 (이 컴퓨터 브라우저에만 저장)">
            <button class="panel-btn" id="save-key-btn">키 저장</button>
            <button class="panel-btn" id="clear-key-btn" style="background:#64748b;">키 삭제</button>
            <button class="panel-btn grade" id="grade-btn">⚡ 미채점 답안 AI 채점 실행</button>
            <button class="panel-btn" id="regrade-all-btn" style="background:#c2410c;">🔄 전체 재채점</button>
            <label class="auto-grade-label">
                <input type="checkbox" id="auto-grade"> 새 제출 자동 채점
            </label>
            <span class="grading-status" id="grading-status"></span>
            <span class="login-note" id="login-note"></span>
        </div>

        <!-- 데이터 관리 패널 -->
        <div class="grading-panel" style="border-color:#e9d5ff; background:#faf5ff;">
            <label>📦 데이터 관리:</label>
            <button class="panel-btn" id="download-btn" style="background:#7c3aed;">⬇️ 전체 답안 다운로드 (엑셀용)</button>
            <button class="panel-btn" id="record-all-btn" style="background:#0d9488;">📋 세특 초안 일괄 생성</button>
            <button class="panel-btn" id="record-download-btn" style="background:#0f766e;">⬇️ 세특 다운로드</button>
            <button class="panel-btn" id="reset-btn" style="background:#b91c1c;">🗑️ 학생 데이터 초기화</button>
            <span class="grading-status" id="data-status"></span>
        </div>

        <div class="table-scroll">
            <table>
                <thead>
                    <tr>
                        <th>학년</th>
                        <th>반</th>
                        <th>번호</th>
                        <th>이름</th>
                        <th>응시 상태</th>
                        <th>제출한 서술형 답안 내용 (최신)</th>
                        <th>AI 채점 현황</th>
                        <th>점수 / 수준</th>
                        <th>Gemini 맞춤 피드백</th>
                    </tr>
                </thead>
                <tbody id="data-list"></tbody>
            </table>
        </div>
    </div>

    <!-- 제출 이력 모달 -->
    <div id="history-modal" class="modal">
        <div class="modal-content">
            <h3 id="history-title">📚 제출 이력</h3>
            <div id="history-body"></div>
            <button class="close-btn" onclick="document.getElementById('history-modal').classList.remove('open')">닫기</button>
        </div>
    </div>

    <!-- 세특 초안 모달 -->
    <div id="record-modal" class="modal">
        <div class="modal-content">
            <h3 id="record-title">📋 세특 초안</h3>
            <p style="font-size:12px; color:#64748b; margin:4px 0 10px;">
                ⚠️ AI가 작성한 <strong>참고용 초안</strong>입니다. 생활기록부에 입력하기 전 반드시 교사가 사실 여부를 확인하고 다듬어 주세요.
            </p>
            <div id="record-body" style="white-space:pre-line; background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px; padding:14px; font-size:14px; line-height:1.7; color:#1e293b;"></div>
            <div style="margin-top:8px; font-size:12px; color:#64748b;" id="record-count"></div>
            <div style="display:flex; gap:8px; margin-top:12px;">
                <button class="panel-btn" id="record-copy-btn" style="background:#7c3aed;">📋 복사</button>
                <button class="panel-btn" id="record-regen-btn" style="background:#c2410c;">🔄 다시 생성</button>
                <button class="close-btn" style="margin:0;" onclick="document.getElementById('record-modal').classList.remove('open')">닫기</button>
            </div>
        </div>
    </div>

    <script>
        /* ═════════════════════════════════
           1. 과목별 문항·성취기준 (채점 기준으로 사용)
        ═════════════════════════════════ */
        const SUBJECT_DATA = {
            '통합사회': {
                defaultQuestions: [
                    '정보 사회의 확산에 따라 나타날 수 있는 긍정적 측면과 부정적 측면에 대해 각각 한 가지씩 서술하시오.',
                    '인공지능 기술의 발전이 미래의 직업 세계에 가져올 변화를 예측하고, 이에 대비하는 개인적 차원의 노력을 근거와 함께 서술하시오.',
                    '지속가능한 미래 사회를 만들기 위해 개인과 정부가 할 수 있는 노력을 각각 한 가지씩 구체적 사례를 들어 서술하시오.'
                ],
                standards: `※ 2022 개정 교육과정 통합사회 1·2 성취기준별 성취수준 (교육부 공식 자료 원문)
[10통사1-01-01] (통합적 관점) 인간, 사회, 환경을 바라 보는 시간적, 공간적, 사 회적, 윤리적 관점의 의 미와 특징을 사례를 통 해 파악한다.
  (A) 인간, 사회, 환경을 바라보는 시간적, 공간적, 사회적, 윤리적 관점의 의미와 특징을 분석하여 심층적으로 이해하고 다양한 사례를 조사하여 적용할 수 있다.
  (B) 인간, 사회, 환경을 바라보는 시간적, 공간적, 사회적, 윤리적 관점의 의미를 이해하여 다양한 사례를 조사하고 적용할 수 있다.
  (C) 인간, 사회, 환경을 바라보는 시간적, 공간적, 사회적, 윤리적 관점의 의미를 이해하고 사례를 조사하여 적용할 수 있다.
  (D) 인간, 사회, 환경을 바라보는 시간적, 공간적, 사회적, 윤리적 관점이 있음을 알고 제시된 사례에 적용할 수 있다.
  (E) 인간, 사회, 환경을 바라보는 시간적, 공간적, 사회적, 윤리적 관점이 있음을 인식하고 간단히 설명할 수 있다.
[10통사1-01-02] (통합적 관점) 인간, 사회, 환경의 탐구 에 통합적 관점이 요청 되는 이유를 도출하고 이를 탐구에 적용한다.
  (A) 인간, 사회, 환경의 탐구에 통합적 관점이 필요한 이유를 탐구하여 심층적으로 이해하고, 통합적 관점을 다양한 사례와 쟁점 탐구에 적용하고 깊은 관심을 가 진다.
  (B) 인간, 사회, 환경의 탐구에 통합적 관점이 필요한 이유를 탐구하여 이해하고, 시간적, 공간적, 사회적, 윤리적 관점 등을 다양한 사례에 적용하고 관심을 가 진다.
  (C) 인간, 사회, 환경의 탐구에서 통합적 관점의 의미를 이해하고, 시간적, 공간적, 사회적, 윤리적 관점 등을 제시된 사례에 적용하고 관심을 가진다.
  (D) 인간, 사회, 환경의 탐구에서 통합적 관점이 있음을 알고 제시된 사례에 대해 여러 관점을 고려하는 자세를 갖고 관심을 가진다.
  (E) 인간, 사회, 환경의 탐구에서 여러 관점을 고려해야 함을 알고 관심을 가진다. 2022 개정 교육과정에 따른 고등학교 사회과 공통과목 성취수준
[10통사1-02-01] (인간, 사회, 환경과 행복) 시대 와 지역에 따라 다르게 나타나는 행복의 기준을 사례를 통해 비교하여 평가하고, 삶의 목적으로 서 행복의 의미를 성찰 한다.
  (A) 시대적 상황과 지역적 여건에 따라 행복의 기준이 다르게 나타난다는 사실을 이해하고, 이와 관련하여 다양한 매체에서 수집한 사례를 분석 및 평가하고, 가치판단을 통해 내면화한 행복에 대한 관점을 바탕으로 삶의 목적으로서 진정 한 행복의 의미를 이해하고 자신의 삶을 성찰할 수 있다.
  (B) 시대적 상황과 지역적 여건에 따라 행복의 기준이 다르게 나타난다는 사실을 이해하고, 이와 관련하여 수집한 사례를 비교하고, 가치판단을 통해 내면화한 행복에 대한 관점을 바탕으로 삶의 목적으로서 진정한 행복의 의미를 이해하고 자신의 삶을 회상할 수 있다.
  (C) 시대적 상황과 지역적 여건에 따라 행복의 기준이 다르게 나타난다는 사실을 이해하고, 이와 관련하여 수집한 사례를 비교하고, 내면화한 행복에 대한 관점 을 바탕으로 삶의 목적으로서 진정한 행복의 의미를 설명하고 자신의 삶을 회상 할 수 있다.
  (D) 시대적 상황과 지역적 여건에 따라 다르게 나타나는 행복의 기준을 나열하고, 삶의 목적으로서 진정한 행복의 의미를 설명하고 자신의 삶을 회상할 수 있다.
  (E) 행복의 기준이 다를 수 있다는 사실을 언급하며 이와 관련된 자신의 일화를 상기할 수 있다.
[10통사1-02-02] (인간, 사회, 환경과 행복) 행복 한 삶을 실현하기 위한 조건으로 질 높은 정주 환경의 조성, 경제적 안 정, 민주주의 발전 및 도 덕적 실천의 필요성에 관해 탐구한다.
  (A) 행복한 삶을 실현하기 위한 조건으로 질 높은 정주환경의 조성, 경제적 안정, 민주주의의 발전 및 도덕적 실천과 관련된 사례를 수집 및 분석하여 그 필요성 을 균형있게 정당화할 수 있으며, 이를 통해 행복한 삶의 실현 방안을 토의를 통해 도출하고, 행복한 삶을 향유할 수 있는 가치와 태도를 함양할 수 있다.
  (B) 행복한 삶을 실현하기 위한 조건으로 질 높은 정주환경의 조성, 경제적 안정, 민주주의의 발전 및 도덕적 실천과 관련된 사례를 수집하여 그 필요성을 설명할 수 있으며, 이를 통해 행복한 삶의 실현 방안을 토의를 통해 도출하고, 행복한 삶을 향유할 수 있는 태도를 함양할 수 있다.
  (C) 행복한 삶을 실현하기 위한 조건으로 질 높은 정주환경의 조성, 경제적 안정, 민주주의의 발전 및 도덕적 실천과 관련된 사례를 수집하여 그 필요성을 제시할 수 있으며, 이를 통해 행복한 삶의 실현 방안을 도출하고, 행복한 삶을 향유할 수 있는 태도를 함양할 수 있다.
  (D) 행복한 삶을 실현하기 위한 조건으로 질 높은 정주환경의 조성, 경제적 안정, 민주주의의 발전 및 도덕적 실천의 필요성을 제시할 수 있으며, 이를 통해 행복 한 삶의 실현 방안을 제시하고, 행복한 삶을 향유할 수 있는 태도를 지닐 수 있다.
  (E) 행복한 삶을 실현하기 위해 필요한 조건이 있음을 제시할 수 있으며, 행복한 삶을 위한 방안을 알고, 행복한 삶과 관련된 태도를 지닐 수 있다.
[10통사1-03-01] (자연환경과 인간) 자연 환경이 인간의 생활에 미치는 영향에 관한 과 거와 현재의 사례를 조 사하여 분석하고, 안전하 고 쾌적한 환경에서 살 아가는 것이 시민의 권 리임을 주장한다.
  (A) 기후와 지형 등 자연환경이 인간의 삶에 미치는 영향에 대해 과거와 현재의 사례를 조사하여, 자연환경에 따른 인간의 생활양식의 차이를 바탕으로 자연환 경이 인간 생활에 미치는 영향을 명확하게 설명하고, 안전하고 쾌적한 환경에서 살아가는 것이 시민에게 보장된 권리임을 인식하고 민주적 절차에 의해 권리를 보장받고 실천할 수 있는 시민성을 가진다.
  (B) 기후와 지형 등 자연환경이 인간의 삶에 미치는 영향에 대해 사례를 조사하여, 자연환경에 따른 생활양식의 차이를 설명하고, 안전하고 쾌적한 환경에서 살아 가는 시민의 권리를 이해하고, 이를 주장할 수 있는 시민성 가진다.
  (C) 기후와 지형 등 자연환경에 따른 인간 생활양식의 차이에 대해 사례를 바탕으로 이해하고, 안전하고 쾌적한 환경에서 살아갈 인간의 권리를 요구할 수 있는 태 도를 가진다.
  (D) 기후 또는 지형 등 자연환경에 따른 인간 생활양식의 차이를 이해하고, 안전하 고 쾌적한 환경에서 살아갈 권리의 의미와 사례를 조사한다.
  (E) 기후 또는 지형 등 자연환경에 따른 인간 생활양식의 차이를 파악하고, 안전하 고 쾌적한 환경에서 살아갈 권리를 조사한다.
[10통사1-03-02] (자연환경과 인간) 자연 에 대한 인간의 다양한 관점을 사례를 통해 비 교하고, 인간과 자연의 바람직한 관계를 제안한 다.
  (A) 인간중심주의와 생태중심주의에 대한 개념을 명확하게 구분하고 이를 바탕으로 자연에 대한 인간의 관점을 설명하고, 구체적인 사례를 조사하여 비교하며, 생 태계 위기를 초래한 인간사회의 모습을 성찰하고 생태계의 위기를 해결하기 위 한 태도를 가진다.
  (B) 인간중심주의와 생태중심주의를 중심으로 자연에 대한 인간의 관점을 구분하 고, 자연에 대한 인간의 관점을 비교하며, 생태계의 위기를 초래한 인간사회의 모습을 사례를 중심으로 설명하고 자연을 대하는 바람직한 태도를 가진다.
  (C) 인간중심주의와 생태중심주의에 대한 개념을 바탕으로 자연에 대한 인간의 관 점을 이해하고, 생태계 위기를 조사하여 이러한 위기를 초래한 인간의 행동에 대해 반성하는 태도를 가진다.
  (D) 인간중심주의와 생태중심주의 개념을 이해하고, 자연에 대한 인간의 관점을 바 탕으로 생태계 위기의 사례를 조사한다.
  (E) 인간중심주의 또는 생태중심주의에 대한 개념을 바탕으로 자연에 대한 인간의 관점을 파악한다.
[10통사1-03-03] (자연환경과 인간) 환경 문제 해결을 위한 정부, 시민사회, 기업 등의 다 양한 노력을 조사하고, 생태 시민으로서 실천 방안을 모색한다.
  (A) 국내외에서 발생하는 환경문제에 대한 원인과 구체적인 문제점을 설명하고, 이를 해결하기 위한 정부, 시민사회, 기업 등 다양한 실제 사례들을 조사하여, 생태전환 적 사고를 바탕으로 다양한 환경문제 해결에 연대하고 실천할 수 있는 생태시민으 로서 태도를 가진다.
  (B) 국내외에서 발생하는 환경문제의 원인과 문제점을 설명하고, 이를 해결하기 위 해 노력한 다양한 사례를 조사하여, 생태전환적 사고를 바탕으로 환경문제를 해결하고자 하는 시민성을 가진다.
  (C) 국내외에서 발생하는 다양한 환경문제를 이해하고, 사례조사를 바탕으로 환경 문제 해결을 위한 방법을 설명하며 환경문제를 해결하려고 노력한다. 2022 개정 교육과정에 따른 고등학교 사회과 공통과목 성취수준
  (D) 국내에서 발생하는 다양한 환경문제를 이해하고, 환경문제 해결을 위해 노력한 사례를 조사하고, 환경문제 해결에 관심을 가진다.
  (E) 주변의 환경문제에 관심을 가지고, 환경문제 해결을 위해 노력한 사례를 조사 한다.
[10통사1-04-01] (문화와 다양성) 자연 환경과 인문환경의 영향 을 받아 형성된 다양한 문화권의 특징과 삶의 방식을 탐구한다.
  (A) 다양한 문화권의 특징과 삶의 방식을 보여주는 자료를 수집하고 문화권의 형성에 영향을 주는 자연환경과 인문환경을 분석하여 비교함으로써 각 문화권의 배경과 맥락을 이해하며, 이를 존중하는 태도를 내면화하여 생활 속에서 실천한다.
  (B) 다양한 문화권의 특징과 삶의 방식을 보여주는 자료를 수집하여 문화권의 형성 에 영향을 주는 자연환경과 인문환경을 분석하며, 각 문화권에 대해 존중하는 태도를 가진다.
  (C) 환경의 영향을 받아 형성된 다양한 문화권의 사례를 조사하여 각 문화권의 특징 과 삶의 방식을 비교하며, 문화권을 존중하는 태도의 필요성을 이해한다.
  (D) 환경의 영향을 받아 형성된 문화권의 사례를 탐색하고 해당 문화권의 특징과 삶의 방식을 파악할 수 있다.
  (E) 주어진 사례에 나타난 문화권의 특징과 삶의 방식을 말할 수 있다.
[10통사1-04-02] (문화와 다양성) 문화 변동의 다양한 양상을 이해하고, 현대 사회에서 전통문화가 지니는 의의 를 탐색한다.
  (A) 문화병존, 문화융합, 문화동화의 구체적인 사례들을 조사하여 유형화하며 다양 한 문화 변동의 양상을 설명하고, 현대 사회에서 전통문화가 가지는 의의를 이 해하고 이를 존중하는 태도를 갖추며 전통문화를 창조적으로 계승ㆍ발전시킬 방안을 제안할 수 있다.
  (B) 문화 변동의 구체적인 사례들을 조사하여 다양한 문화 변동의 양상을 설명하고, 전통문화에 대한 이해와 존중의 태도를 갖추며 현대 사회에서 전통문화를 계승 ㆍ발전시킬 방안을 탐색할 수 있다.
  (C) 문화 변동의 사례들을 조사하여 문화 변동이 다양한 양상으로 나타남을 이해하 고, 현대 사회에서 전통문화가 가진 의의를 설명할 수 있다.
  (D) 문화 변동의 다양한 양상을 나열하고, 전통문화가 가진 의의를 설명할 수 있다.
  (E) 문화 변동과 전통문화의 의미를 사례와 함께 말할 수 있다.

  (D) 평화의 관점에서 국제 사회의 갈등과 협력 사례를 조사하여 설명하고, 세계 평 화를 지속하기 위한 여러 행위 주체들을 분류하여 제시할 수 있다.
  (E) 평화의 관점에서 국제 사회의 갈등과 협력 사례를 나열하고, 세계 평화를 지속 하기 위한 여러 행위 주체들이 있음을 확인할 수 있다.
[10통사2-04-03] (세계화와 평화) 남북 분단과 동아시아의 역사 갈등 상황을 분석 하고, 이를 토대로 우리 나라가 세계 평화에 기 여할 수 있는 방안을 제 안한다.

  (B) 남북 분단과 동아시아 역사 갈등 상황의 역사적 배경과 그로 인한 문제점을 비판적으로 분석하고, 평화적인 문제 해결 방안을 다양한 측면에서 탐색하고 우리나라가 국제 사회의 평화를 위해 기여할 수 있는 방안을 제안하여 국제 사회와 소통하고 협력하는 자세를 가질 수 있다.

  (D) 남북 분단과 동아시아의 역사 갈등 상황을 시간적 순서에 따라 나열하고, 우리 나라가 국제 사회와 소통하고 협력하여 세계 평화에 기여할 수 있음을 이해할 수 있다.

[10통사2-05-01] (미래와 지속가능한 삶) 세계 의 인구 분포와 구조 등 에 대한 이해를 토대로 현재와 미래의 인구 문 제 양상을 파악하고, 그 해결 방안을 제안한다.

  (C) 세계 인구 분포와 구조, 인구 이동의 추세를 이해하여, 다양한 인구 문제가 나타 나게 된 배경과 문제점을 조사하고, 우리가 당면한 인구 문제를 고려하여 적절 한 해결 방안을 모색할 수 있다.

[10통사2-05-02] (미래와 지속가능한 삶) 지구 적 차원에서 에너지 자 원의 분포와 소비 실태 를 파악하고, 기후변화에 대한 대응과 지속가능한 발전을 위한 제도적 방 안과 개인적 노력을 탐 구한다.

  (C) 다양한 자원의 분포 및 소비 현황을 분석하여, 세계의 자원 소비 실태와 이에 따른 문제점을 인식하고 개선 방안을 조사하며, 지속가능한 발전을 위한 제도적 방안을 모색하고 이를 실천하고자 노력할 수 있다.

[10통사2-05-03] (미래와 지속가능한 삶) 미래 사회의 모습을 다양한 측면에서 예측하고, 이를 바탕으로 세계시민으로 서 자신의 미래 삶의 방 향을 설정한다.
  (A) 정치ㆍ 경제ㆍ환경적 문제에 따른 국가 간 협력과 갈등, 과학기술 발전에 따른 공간 변화, 생태환경의 변화 등에 관한 자료를 분석하여, 미래 사회의 변화 양상 을 긍정적ㆍ부정적 측면으로 나누어 균형 잡힌 시각으로 예측하고 자신이 세계 시민이라는 점을 인식하고 이에 맞게 미래 삶의 방향을 설정할 수 있다.
  (B) 기술 발전에 따른 공간 변화, 생태환경의 변화 등에 관한 자료를 분석하여, 미래 사회의 변화 양상을 긍정적ㆍ부정적 측면으로 나누어 예측하고 자신이 세계시 민이라는 점과 관련지어 미래 삶의 방향을 설정할 수 있다.
  (C) 기술 발전에 따른 공간 변화, 생태환경의 변화 등에 관한 자료를 분석하여, 미래 사회의 변화 양상을 긍정적 측면이나 부정적 측면 중 한 가지 측면에서 예측하 고 자신이 세계시민이라는 점과 관련지어 미래 삶의 방향을 모색할 수 있다.
  (D) 미래 사회의 변화에 관한 자료를 분석하여, 미래 사회의 변화 양상을 긍정적 측면이나 부정적 측면 중 한 가지 측면에서 예측하고 미래 삶의 방향을 모색할 수 있다.

                standardsBrief: `※ 2022 개정 교육과정 통합사회 1·2 성취기준 (교육부 공식 자료)
[10통사1-01-01] (통합적 관점) 인간, 사회, 환경을 바라 보는 시간적, 공간적, 사 회적, 윤리적 관점의 의 미와 특징을 사례를 통 해 파악한다.
[10통사1-01-02] (통합적 관점) 인간, 사회, 환경의 탐구 에 통합적 관점이 요청 되는 이유를 도출하고 이를 탐구에 적용한다.
[10통사1-02-01] (인간, 사회, 환경과 행복) 시대 와 지역에 따라 다르게 나타나는 행복의 기준을 사례를 통해 비교하여 평가하고, 삶의 목적으로 서 행복의 의미를 성찰 한다.
[10통사1-02-02] (인간, 사회, 환경과 행복) 행복 한 삶을 실현하기 위한 조건으로 질 높은 정주 환경의 조성, 경제적 안 정, 민주주의 발전 및 도 덕적 실천의 필요성에 관해 탐구한다.
[10통사1-03-01] (자연환경과 인간) 자연 환경이 인간의 생활에 미치는 영향에 관한 과 거와 현재의 사례를 조 사하여 분석하고, 안전하 고 쾌적한 환경에서 살 아가는 것이 시민의 권 리임을 주장한다.
[10통사1-03-02] (자연환경과 인간) 자연 에 대한 인간의 다양한 관점을 사례를 통해 비 교하고, 인간과 자연의 바람직한 관계를 제안한 다.
[10통사1-03-03] (자연환경과 인간) 환경 문제 해결을 위한 정부, 시민사회, 기업 등의 다 양한 노력을 조사하고, 생태 시민으로서 실천 방안을 모색한다.
[10통사1-04-01] (문화와 다양성) 자연 환경과 인문환경의 영향 을 받아 형성된 다양한 문화권의 특징과 삶의 방식을 탐구한다.
[10통사1-04-02] (문화와 다양성) 문화 변동의 다양한 양상을 이해하고, 현대 사회에서 전통문화가 지니는 의의 를 탐색한다.
[10통사1-04-03] (문화와 다양성) 문화 적 차이에 대한 상대주 의적 태도의 필요성을 이해하고, 보편 윤리의 차원에서 자문화와 타문 화를 평가한다.
[10통사1-04-04] (문화와 다양성) 다문 화 사회의 현황을 조사 하고, 문화적 다양성을 존중하는 태도를 바탕으 로 갈등 해결 방안을 모 색한다.
[10통사1-05-01] (생활공간의 변화) 산업 화, 도시화로 인해 나타 난 생활공간과 생활양식 의 변화 양상을 조사하 고, 이에 따른 문제점의 해결 방안을 제안한다.
[10통사1-05-02] (생활공간의 변화) 교통 ㆍ통신 및 과학기술의 발 달과 함께 나타난 생활공 간과 생활양식의 변화 양 상을 조사하고, 이에 따 른 문제점의 해결 방안을 제안한다.
[10통사1-05-03] (생활공간의 변화) 자신 이 거주하는 지역을 사례 로 공간 변화가 초래한 양상 및 문제점을 탐구하 고, 공동체의 구성원으로 서 지역사회의 변화를 위 한 방안을 모색하고 이를 실천한다.
[10통사2-01-01] (인권보장과 헌법) 근대 시민 혁명 등을 통해 확립 되어 온 인권의 의미와 변 화 양상을 이해하고, 현대 사회에서 주거, 안전, 환 경, 문화 등 다양한 영역 으로 인권이 확장되고 있 는 사례를 조사한다.
[10통사2-01-02] (인권보장과 헌법) 인간 존엄성 실현과 인권 보장 을 위한 헌법의 역할을 파악하고, 시민의 권익을 보호하기 위한 다양한 시 민 참여의 방안을 탐구하 고 이를 실천한다.
[10통사2-01-03] (인권보장과 헌법) 사회 적 소수자 차별, 청소년 의 노동권 등 국내 인권 문제와 인권지수를 통해 확인할 수 있는 세계 인 권 문제의 양상을 조사하 고, 이에 대한 해결 방안 을 모색한다.
[10통사2-02-01] (사회정의와 불평등) 정의 의 의미와 정의가 요구 되는 이유를 파악하고, 다양한 사례를 통해 정 의의 실질적 기준을 탐 구한다.

                standardsBrief: `※ 2022 개정 교육과정 사회와 문화 성취기준 (교육부 공식 자료)

        /* ═════════════════════════════════
           6. Gemini AI 채점 (핵심 신규 기능)
           - API 키는 이 브라우저(localStorage)에만 저장
           - 성취기준·성취수준을 기준으로 점수(10점 만점),
             성취수준(A~E), 피드백을 생성해 Firebase에 기록
        ═════════════════════════════════ */
        const keyInput = document.getElementById('api-key');
        keyInput.value = localStorage.getItem('gemini_api_key') || '';

        document.getElementById('save-key-btn').addEventListener('click', () => {
            localStorage.setItem('gemini_api_key', keyInput.value.trim());
            setGradingStatus('🔑 API 키가 이 컴퓨터 브라우저에만 저장되었습니다. (다른 선생님은 각자 컴퓨터에서 본인 키를 저장하면 됩니다)');
        });

        // 공용 컴퓨터에서 자리를 뜰 때: 저장된 키를 지움
        document.getElementById('clear-key-btn').addEventListener('click', () => {
            localStorage.removeItem('gemini_api_key');
            keyInput.value = '';
            setGradingStatus('🗑️ 저장된 API 키를 이 컴퓨터에서 지웠습니다.');
        });

        function setGradingStatus(msg) {
            document.getElementById('grading-status').textContent = msg;
        }

        // 채점에 사용할 모델 목록 (앞의 것부터 시도, 실패 시 다음 모델로 자동 전환)
        // ※ gemini-2.0-flash는 2026년 6월 1일 서비스 종료됨
        const GEMINI_MODELS = ['gemini-2.5-flash', 'gemini-2.5-flash-lite', 'gemini-flash-latest'];
        let workingModelIndex = 0;

        // AI 응답에서 JSON을 안전하게 꺼내는 공용 함수
        // (줄바꿈·설명 문구가 섞여도 해석되고, 차단·중단된 응답은 이유를 알려줌)
        function parseGeminiJson(data) {
            if (data?.promptFeedback?.blockReason) {
                throw new Error('AI가 이 내용의 처리를 거부했습니다 (사유: ' + data.promptFeedback.blockReason + ')');
            }
            const cand = data?.candidates?.[0];
            const raw = (cand?.content?.parts?.[0]?.text || '').replace(/```json|```/g, '').trim();
            if (!raw) {
                const fr = cand?.finishReason ? ` (finishReason: ${cand.finishReason})` : '';
                throw new Error('AI 응답이 비어 있습니다' + fr + '. 다시 실행하면 대부분 해결됩니다.');
            }
            // 앞뒤 잡담이 붙어도 첫 { 부터 마지막 } 까지만 추출
            const s = raw.indexOf('{');
            const e = raw.lastIndexOf('}');
            const jsonStr = (s >= 0 && e > s) ? raw.slice(s, e + 1) : raw;
            try {
                return JSON.parse(jsonStr);
            } catch (err) {
                // 문자열 안에 생(生) 줄바꿈 등 제어문자가 들어간 경우 → 공백으로 바꿔 재시도
                return JSON.parse(jsonStr.replace(/[\u0000-\u001F]+/g, ' '));
            }
        }

        async function callGemini(sub) {
            const apiKey = (keyInput.value || '').trim();
            if (!apiKey) throw new Error('API 키를 먼저 입력하고 [키 저장]을 눌러주세요.');

            // 학생이 답한 문항을 기준으로 채점 (문항 정보가 없는 예전 제출은 기본 1번 문항 사용)
            const questionText = sub.questionText || SUBJECT_DATA[subj].defaultQuestions[0];

            const prompt = `당신은 고등학교 사회과 서술형 평가를 채점하는 교사입니다.

[문항]
${questionText}

[이 과목의 공식 성취기준 및 성취기준별 성취수준]
${SUBJECT_DATA[subj].standards}

[학생 답안]
${sub.answer}

위 목록에서 이 문항과 가장 관련 깊은 성취기준을 스스로 하나 선택하고, 반드시 그 기준의 성취수준 (A)~(E) 서술을 근거로 학생 답안을 채점하세요.
반드시 아래 형식의 JSON만 출력하세요. 다른 설명이나 마크다운 기호는 절대 쓰지 마세요.
{"score": 0에서 10 사이의 정수, "level": "A"|"B"|"C"|"D"|"E", "standard": "선택한 성취기준 코드 (예: 10통사2-05-03)", "final": "답안 전체에 대한 1~2문장의 총평 (학생에게 존댓말로)", "rationale": "왜 이 성취수준으로 판정했는지, 선택한 성취기준의 성취수준 서술과 학생 답안 내용을 직접 연결하여 설명하는 1~2문장", "strengths": "잘한 점 1~2가지 (존댓말)", "improvements": "보완할 점 1~2가지 (존댓말)"}`;

            // 현재 모델부터 시도하고, 모델 문제(404/한도 0 등)면 다음 모델로 자동 전환
            let data = null;
            let lastError = null;
            for (let i = workingModelIndex; i < GEMINI_MODELS.length; i++) {
                const model = GEMINI_MODELS[i];
                const res = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { temperature: 0.2, responseMimeType: 'application/json' }
                        })
                    }
                );

                if (res.ok) {
                    workingModelIndex = i; // 성공한 모델을 기억해서 다음부터 바로 사용
                    data = await res.json();
                    break;
                }

                const errBody = await res.json().catch(() => ({}));
                const msg = errBody?.error?.message || '';
                lastError = `[${model}] HTTP ${res.status} — ${msg}`;

                // 키 자체가 잘못된 경우(400/403)는 모델을 바꿔도 소용없으니 즉시 중단
                if (res.status === 400 || res.status === 403) {
                    throw new Error('Gemini 호출 실패: ' + lastError);
                }
                // 그 외(모델 종료, 한도 0, 404 등)는 다음 모델로 재시도
            }

            if (!data) {
                throw new Error('Gemini 호출 실패 (모든 모델 시도함): ' + lastError);
            }
            const parsed = parseGeminiJson(data);
            if (typeof parsed.score !== 'number' || !parsed.level) {
                throw new Error('채점 결과 형식이 올바르지 않습니다.');
            }

            // 피드백을 1.총평 → 2.채점 근거 → 3.잘한 점/보완할 점 순서로 조립
            let feedback;
            if (parsed.final || parsed.rationale || parsed.strengths || parsed.improvements) {
                const stdTag = parsed.standard ? ` · 성취기준 ${parsed.standard}` : '';
                feedback =
                    `1️⃣ 최종 피드백: ${parsed.final || '-'}\n` +
                    `2️⃣ 채점 근거 (수준 ${parsed.level}${stdTag}): ${parsed.rationale || '-'}\n` +
                    `3️⃣ 잘한 점: ${parsed.strengths || '-'}\n` +
                    `    보완할 점: ${parsed.improvements || '-'}`;
            } else if (parsed.feedback) {
                feedback = parsed.feedback;   // 혹시 AI가 예전 형식으로 답한 경우 대비
            } else {
                throw new Error('채점 결과 형식이 올바르지 않습니다.');
            }

            return { score: parsed.score, level: parsed.level, feedback: feedback };
        }

        // 채점 실패 원인을 선생님이 이해하기 쉬운 한글로 번역
        function explainGradingError(e) {
            const m = String((e && e.message) || e);
            if (m.includes('API 키를 먼저')) return 'API 키가 비어 있어요. 키를 입력하고 [키 저장]을 눌러주세요.';
            if (m.includes('API_KEY_INVALID') || m.includes('API key not valid') || m.includes('HTTP 400'))
                return 'API 키가 올바르지 않아요. aistudio.google.com에서 키를 다시 복사해 붙여넣어 주세요.';
            if (m.includes('Gemini 호출 실패') && m.includes('HTTP 403'))
                return 'API 키에 권한이 없어요. 키가 삭제되었거나 다른 프로젝트의 키일 수 있어요.';
            if (m.includes('HTTP 429') || m.toLowerCase().includes('quota') || m.includes('RESOURCE_EXHAUSTED'))
                return '무료 사용량 한도(분당 요청 수)에 잠시 걸렸어요. 1~2분 뒤 채점 버튼을 다시 눌러주세요.';
            if (m.includes('HTTP 404'))
                return 'AI 모델을 찾지 못했어요. 모델이 변경·종료되었을 수 있으니 알려주세요.';
            if (m.includes('HTTP 5') || m.toLowerCase().includes('overloaded') || m.includes('UNAVAILABLE'))
                return 'Gemini 서버가 지금 혼잡해요. 잠시 후 다시 실행해 주세요.';
            if (m.includes('Failed to fetch') || m.includes('NetworkError'))
                return '인터넷 연결 문제로 Gemini에 접속하지 못했어요. 네트워크를 확인해 주세요.';
            if (m.toUpperCase().includes('PERMISSION_DENIED'))
                return 'Firebase 창고에 결과를 기록할 권한이 없어요. 데이터베이스 규칙을 확인해 주세요.';
            if (m.includes('JSON') || m.includes('Unexpected token') || m.includes('형식이 올바르지'))
                return 'AI가 정해진 형식으로 답하지 않았어요. 다시 실행하면 대부분 해결됩니다.';
            return m;   // 알 수 없는 오류는 원문 그대로 표시
        }

        // 미채점(채점대기 또는 채점실패) 제출 목록 수집 (studentFilter를 주면 그 학생 것만)
        function collectPending(studentFilter) {
            const list = [];
            Object.entries(evaluations).forEach(([studentKey, evalData]) => {
                if (studentFilter && studentKey !== studentFilter) return;
                const subs = evalData.submissions || {};
                Object.entries(subs).forEach(([subId, sub]) => {
                    if (sub.status === '채점대기' || sub.status === '채점실패') {
                        list.push({ studentKey, subId, sub });
                    }
                });
            });
            return list;
        }

        // 상태와 무관하게 모든 제출을 수집 (재채점용, studentFilter를 주면 그 학생 것만)
        function collectAll(studentFilter) {
            const list = [];
            Object.entries(evaluations).forEach(([studentKey, evalData]) => {
                if (studentFilter && studentKey !== studentFilter) return;
                const subs = evalData.submissions || {};
                Object.entries(subs).forEach(([subId, sub]) => {
                    list.push({ studentKey, subId, sub });
                });
            });
            return list;
        }

        let isGrading = false;

        // 주어진 제출 목록을 순서대로 채점 (전체·개별·재채점 모두 이 함수 하나로 처리)
        async function runGradingList(pending, emptyMsg) {
            if (isGrading) { setGradingStatus('⏳ 이미 채점이 진행 중입니다. 잠시만요...'); return; }
            if (pending.length === 0) {
                setGradingStatus(emptyMsg || '✅ 채점할 대기 답안이 없습니다.');
                return;
            }

            try {
                await ensureTeacherLogin();
            } catch (e) {
                setGradingStatus('❌ 교사 로그인이 취소되어 채점을 중단했습니다.');
                return;
            }

            isGrading = true;
            const btn = document.getElementById('grade-btn');
            btn.disabled = true;
            let done = 0, failed = 0, lastFailReason = '';

            for (const { studentKey, subId, sub } of pending) {
                setGradingStatus(`🤖 채점 중... (${done + failed + 1} / ${pending.length})`);
                const ref = database.ref(`evaluations/${subjKey}/${studentKey}/submissions/${subId}`);
                try {
                    let result;
                    try {
                        result = await callGemini(sub);
                    } catch (firstErr) {
                        // 일시적 오류(형식 어긋남·순간 혼잡)일 수 있으니 1.5초 쉬고 한 번 더 시도
                        await new Promise((r) => setTimeout(r, 1500));
                        result = await callGemini(sub);
                    }
                    await ref.update({
                        status: '채점완료',
                        score: `${result.score} / 10점`,
                        level: result.level,
                        feedback: result.feedback,
                        gradedAt: firebase.database.ServerValue.TIMESTAMP
                    });
                    done++;
                } catch (e) {
                    failed++;
                    lastFailReason = explainGradingError(e);
                    await ref.update({
                        status: '채점실패',
                        feedback: '⚠️ 채점 실패 원인: ' + lastFailReason
                    }).catch(() => { });
                    // 키가 아예 잘못된 경우엔 반복해도 소용없으니 중단
                    if (String(e.message).includes('API 키') || String(e.message).includes('API key')) {
                        setGradingStatus('❌ ' + lastFailReason);
                        break;
                    }
                }
            }

            setGradingStatus(
                `🏁 채점 완료: 성공 ${done}건` +
                (failed ? `, 실패 ${failed}건 — 원인: ${lastFailReason} (다시 실행하면 재시도됩니다)` : '')
            );
            isGrading = false;
            btn.disabled = false;
        }

        document.getElementById('grade-btn').addEventListener('click', () => {
            runGradingList(collectPending());
        });

        document.getElementById('regrade-all-btn').addEventListener('click', () => {
            const all = collectAll();
            if (all.length === 0) { setGradingStatus('재채점할 답안이 없습니다.'); return; }
            if (!confirm(`⚠️ 모든 답안 ${all.length}건을 처음부터 다시 채점합니다.\n기존 점수·수준·피드백을 새 결과로 덮어씁니다. 계속할까요?`)) return;
            runGradingList(all);
        });

        // 개별 학생 채점/재채점 (표의 채점 메뉴 토글에서 호출)
        function gradeStudent(studentKey, name) {
            runGradingList(collectPending(studentKey), `✅ ${name} 학생은 채점 대기 중인 답안이 없습니다.`);
        }
        function regradeStudent(studentKey, name) {
            const all = collectAll(studentKey);
            if (all.length === 0) { setGradingStatus(`${name} 학생은 재채점할 답안이 없습니다.`); return; }
            if (!confirm(`${name} 학생의 답안 ${all.length}건을 다시 채점합니다.\n기존 결과를 덮어씁니다. 계속할까요?`)) return;
            runGradingList(all);
        }

        // 자동 채점: 새 제출이 감지되면 자동 실행 (체크박스 켜져 있을 때만)
        let autoGradeTimer = null;
        function maybeAutoGrade() {
            if (!document.getElementById('auto-grade').checked) return;
            if (collectPending().length === 0) return;
            clearTimeout(autoGradeTimer);
            autoGradeTimer = setTimeout(() => runGradingList(collectPending()), 1500); // 연속 제출을 묶어서 처리
        }

        /* ═════════════════════════════════
           6-1. 데이터 관리: 답안 다운로드 & 초기화
        ═════════════════════════════════ */
        function setDataStatus(msg) {
            document.getElementById('data-status').textContent = msg;
        }

        function csvEscape(v) {
            return '"' + String(v ?? '').replace(/"/g, '""') + '"';
        }

        // ⬇️ 모든 제출 답안을 엑셀에서 열리는 CSV 파일로 저장
        document.getElementById('download-btn').addEventListener('click', () => {
            const rows = [];
            Object.entries(evaluations).forEach(([studentKey, evalData]) => {
                const info = evalData.info || {};
                getSubmissionList(evalData).forEach((sub, idx) => {
                    rows.push({ info, sub, idx });
                });
            });
            if (rows.length === 0) {
                setDataStatus('다운로드할 제출 답안이 아직 없습니다.');
                return;
            }
            rows.sort((a, b) => {
                const g = Number(a.info.grade || 0) - Number(b.info.grade || 0);
                if (g !== 0) return g;
                const c = String(a.info.class || '').localeCompare(String(b.info.class || ''), 'ko', { numeric: true });
                if (c !== 0) return c;
                const n = Number(a.info.number || 0) - Number(b.info.number || 0);
                if (n !== 0) return n;
                return (a.sub.submittedAt || 0) - (b.sub.submittedAt || 0);
            });

            const header = ['과목', '학년', '반', '번호', '이름', '제출 회차', '문항 번호', '문항 내용',
                '답안', '채점 상태', '점수', '성취수준', 'AI 피드백', '제출 시각', '제출 시점 누적 이탈'];
            const lines = [header.map(csvEscape).join(',')];
            rows.forEach(({ info, sub, idx }) => {
                lines.push([
                    subj, info.grade || '', info.class || '', info.number || '', info.name || '',
                    idx + 1, sub.questionNo || '', sub.questionText || '', sub.answer || '',
                    sub.status || '', sub.score || '', sub.level || '', sub.feedback || '',
                    sub.submittedAt ? new Date(sub.submittedAt).toLocaleString('ko-KR') : '',
                    sub.awayCountAtSubmit ?? ''
                ].map(csvEscape).join(','));
            });

            // 맨 앞의 특수 표시(BOM)는 엑셀이 한글을 바르게 읽게 하는 장치
            const blob = new Blob(['\uFEFF' + lines.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement('a');
            const today = new Date().toISOString().slice(0, 10);
            a.href = URL.createObjectURL(blob);
            a.download = `서술형답안_${subj}_${today}.csv`;
            a.click();
            URL.revokeObjectURL(a.href);
            setDataStatus(`✅ ${rows.length}건의 답안을 내려받았습니다. 엑셀에서 바로 열립니다.`);
        });

        // 🗑️ 이 과목의 학생 데이터 전체 초기화 (다운로드 후 사용 권장)
        document.getElementById('reset-btn').addEventListener('click', async () => {
            if (!confirm(
                `⚠️ [${subj}] 과목의 모든 학생 데이터를 지웁니다.\n` +
                `(응시 기록, 제출 답안, 채점 결과, 학생별 이어쓰기 임시저장)\n\n` +
                `지우기 전에 [⬇️ 전체 답안 다운로드]로 백업해 두시길 강력히 권장합니다.\n\n계속할까요?`
            )) return;

            const typed = prompt('실수 방지를 위해, 정말 지우시려면 아래 칸에 "초기화"라고 입력하세요.');
            if (typed !== '초기화') {
                setDataStatus('입력이 달라 초기화를 취소했습니다.');
                return;
            }

            try {
                await ensureTeacherLogin();
            } catch (e) {
                setDataStatus('❌ 교사 로그인이 취소되어 초기화를 중단했습니다.');
                return;
            }

            setDataStatus('🧹 초기화 중...');
            try {
                await database.ref(`sessions/${subjKey}`).remove();
                await database.ref(`evaluations/${subjKey}`).remove();
                // 학생별 이어쓰기 글은 각자의 서랍에 있어 교사가 직접 못 지우므로,
                // "이 시각 이전의 임시저장은 무시하라"는 표시를 남겨 새로 시작하게 함
                await database.ref(`questions/${subjKey}/resetAt`).set(firebase.database.ServerValue.TIMESTAMP);
                expandedAnswers.clear();
                setDataStatus('✅ 초기화 완료! 표가 비워졌고, 학생들의 임시저장 글도 새로 시작됩니다.');
            } catch (err) {
                setDataStatus('❌ 초기화 실패: ' + err.message);
            }
        });

        /* ═════════════════════════════════
           6-2. 생활기록부 세특 초안 (AI 참고용)
           - 학생의 서술형 답안 + 공식 성취기준·성취수준을 바탕으로
             과목별 세부능력·특기사항 초안을 생성 (교사 확인 필수)
        ═════════════════════════════════ */
        async function callGeminiPrompt(prompt) {
            const apiKey = (keyInput.value || '').trim();
            if (!apiKey) throw new Error('API 키를 먼저 입력하고 [키 저장]을 눌러주세요.');
            let data = null, lastError = null;
            for (let i = workingModelIndex; i < GEMINI_MODELS.length; i++) {
                const model = GEMINI_MODELS[i];
                const res = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { temperature: 0.4, responseMimeType: 'application/json' }
                        })
                    }
                );
                if (res.ok) { workingModelIndex = i; data = await res.json(); break; }
                const errBody = await res.json().catch(() => ({}));
                lastError = `[${model}] HTTP ${res.status} — ${errBody?.error?.message || ''}`;
                if (res.status === 400 || res.status === 403) throw new Error('Gemini 호출 실패: ' + lastError);
            }
            if (!data) throw new Error('Gemini 호출 실패 (모든 모델 시도함): ' + lastError);
            return parseGeminiJson(data);
        }

        function buildRecordPrompt(info, subs) {
            const perf = subs.map((s, i) =>
                `(${i + 1}) 문항: ${s.questionText || '-'}\n    학생 답안: ${s.answer || '-'}\n    채점 결과: ${s.level ? `성취수준 ${s.level}` : (s.status || '미채점')}`
            ).join('\n');
            return `당신은 고등학교 사회과 교사입니다. 아래 학생의 서술형 평가 수행 내용을 바탕으로 학교생활기록부 '과목별 세부능력 및 특기사항'에 참고할 초안을 작성하세요.

[과목] ${subj}

[이 과목의 공식 성취기준 및 성취기준별 성취수준]
${SUBJECT_DATA[subj].standards}

[학생의 서술형 평가 수행 내용]
${perf}

작성 규칙:
- 학생 이름·인적사항·성취기준 코드·점수나 등급 숫자는 절대 쓰지 않는다.
- 성취수준 문자(A~E)나 '상·중·하' 같은 서열 표현도 절대 쓰지 않는다. (수준은 서술의 깊이 조절에만 참고)
- '~함', '~임', '~하는 모습을 보임' 형태의 개조식 문어체로 쓴다.
- 학생 답안에서 실제로 드러난 개념 이해, 논리 전개 방식, 사용한 사례, 관심 주제를 구체적으로 언급하여 이 학생만의 특성이 드러나게 쓴다. 답안에 없는 활동을 지어내지 않는다.
- 관련 성취기준의 내용 요소를 자연스럽게 녹여 쓰되, 학생이 도달한 성취수준에 맞는 사실적 서술을 하고 과장하지 않는다.
- 부정적·단정적 표현 대신 노력과 성장 가능성 중심으로 서술한다.
- 전체 400~500자 분량의 하나의 이어진 글로 쓴다.
반드시 아래 형식의 JSON만 출력하세요. 다른 설명이나 마크다운은 절대 쓰지 마세요.
{"record": "세특 초안 내용"}`;
        }

        async function generateRecordFor(studentKey) {
            const evalData = evaluations[studentKey];
            const subs = getSubmissionList(evalData);
            if (subs.length === 0) throw new Error('제출한 답안이 없어 세특을 만들 수 없습니다.');
            const info = (evalData && evalData.info) || {};
            const parsed = await callGeminiPrompt(buildRecordPrompt(info, subs));
            if (!parsed.record) throw new Error('세특 결과 형식이 올바르지 않습니다.');
            const record = { text: String(parsed.record).trim(), generatedAt: firebase.database.ServerValue.TIMESTAMP };
            await database.ref(`evaluations/${subjKey}/${studentKey}/record`).set(record);
            return record.text;
        }

        // ── 세특 모달 ──
        let currentRecordKey = null, currentRecordName = '';

        function showRecordModal(name, text) {
            document.getElementById('record-title').textContent = `📋 ${name} 학생 세특 초안 (${subj})`;
            document.getElementById('record-body').textContent = text;
            document.getElementById('record-count').textContent = `글자 수: ${text.length}자 (공백 포함)`;
            document.getElementById('record-modal').classList.add('open');
        }

        async function openRecord(studentKey, name) {
            currentRecordKey = studentKey;
            currentRecordName = name;
            const existing = evaluations[studentKey] && evaluations[studentKey].record;
            if (existing && existing.text) {
                showRecordModal(name, existing.text);
                return;
            }
            try {
                await ensureTeacherLogin();
                setDataStatus(`🤖 ${name} 학생 세특 초안 작성 중...`);
                const text = await generateRecordFor(studentKey);
                setDataStatus(`✅ ${name} 학생 세특 초안 완성!`);
                showRecordModal(name, text);
            } catch (e) {
                setDataStatus('❌ 세특 생성 실패 — ' + explainGradingError(e));
            }
        }

        document.getElementById('record-regen-btn').addEventListener('click', async () => {
            if (!currentRecordKey) return;
            try {
                await ensureTeacherLogin();
                document.getElementById('record-body').textContent = '🤖 새로 작성하는 중... 잠시만 기다려 주세요.';
                const text = await generateRecordFor(currentRecordKey);
                showRecordModal(currentRecordName, text);
            } catch (e) {
                document.getElementById('record-body').textContent = '❌ 생성 실패 — ' + explainGradingError(e);
            }
        });

        document.getElementById('record-copy-btn').addEventListener('click', () => {
            const text = document.getElementById('record-body').textContent;
            navigator.clipboard.writeText(text).then(() => {
                document.getElementById('record-count').textContent = '✅ 복사되었습니다! 생기부 입력창에 붙여넣으세요.';
            }).catch(() => {
                document.getElementById('record-count').textContent = '복사 실패 — 내용을 드래그하여 직접 복사해 주세요.';
            });
        });

        document.getElementById('record-modal').addEventListener('click', (e) => {
            if (e.target.id === 'record-modal') e.target.classList.remove('open');
        });

        // ── 세특 일괄 생성 (아직 없는 학생만) ──
        let isRecordBatch = false;
        document.getElementById('record-all-btn').addEventListener('click', async () => {
            if (isRecordBatch) { setDataStatus('⏳ 이미 세특 일괄 생성이 진행 중입니다.'); return; }
            const targets = Object.entries(evaluations)
                .filter(([k, v]) => getSubmissionList(v).length > 0 && !(v.record && v.record.text))
                .map(([k, v]) => ({ key: k, name: (v.info && v.info.name) || '학생' }));
            if (targets.length === 0) {
                setDataStatus('✅ 제출한 모든 학생의 세특 초안이 이미 있습니다. (개별 [세특 초안 보기]에서 확인·재생성 가능)');
                return;
            }
            if (!confirm(`아직 세특 초안이 없는 학생 ${targets.length}명의 초안을 만듭니다.\n(무료 사용량 한도 때문에 1명당 약 2~3초씩 걸립니다) 진행할까요?`)) return;
            try { await ensureTeacherLogin(); } catch (e) { return; }

            isRecordBatch = true;
            let done = 0, failed = 0, lastReason = '';
            for (const t of targets) {
                setDataStatus(`🤖 세특 작성 중... (${done + failed + 1}/${targets.length}) — ${t.name}`);
                try {
                    await generateRecordFor(t.key);
                    done++;
                } catch (e) {
                    failed++;
                    lastReason = explainGradingError(e);
                    if (String(e.message).includes('API 키')) break;
                }
                await new Promise((r) => setTimeout(r, 1500));  // 분당 요청 한도 보호
            }
            isRecordBatch = false;
            setDataStatus(`🏁 세특 일괄 생성 완료: 성공 ${done}명` +
                (failed ? `, 실패 ${failed}명 — 원인: ${lastReason} (다시 실행하면 없는 학생만 재시도)` : ''));
        });

        // ── 세특 다운로드 (엑셀용 CSV) ──
        document.getElementById('record-download-btn').addEventListener('click', () => {
            const rows = Object.entries(evaluations)
                .filter(([k, v]) => v.record && v.record.text)
                .map(([k, v]) => ({ info: v.info || {}, record: v.record }));
            if (rows.length === 0) {
                setDataStatus('다운로드할 세특 초안이 없습니다. 먼저 [세특 초안 일괄 생성]을 눌러주세요.');
                return;
            }
            rows.sort((a, b) => {
                const g = Number(a.info.grade || 0) - Number(b.info.grade || 0);
                if (g !== 0) return g;
                const c = String(a.info.class || '').localeCompare(String(b.info.class || ''), 'ko', { numeric: true });
                if (c !== 0) return c;
                return Number(a.info.number || 0) - Number(b.info.number || 0);
            });
            const lines = [['과목', '학년', '반', '번호', '이름', '세특 초안 (교사 확인 필수)', '글자 수'].map(csvEscape).join(',')];
            rows.forEach(({ info, record }) => {
                lines.push([subj, info.grade || '', info.class || '', info.number || '', info.name || '',
                    record.text, record.text.length].map(csvEscape).join(','));
            });
            const blob = new Blob(['\uFEFF' + lines.join('\r\n')], { type: 'text/csv;charset=utf-8;' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `세특초안_${subj}_${new Date().toISOString().slice(0, 10)}.csv`;
            a.click();
            URL.revokeObjectURL(a.href);
            setDataStatus(`✅ ${rows.length}명의 세특 초안을 내려받았습니다. 생기부 입력 전 꼭 검토·수정해 주세요.`);
        });

        /* ═════════════════════════════════
           7. 렌더링 (textContent 사용 → XSS 차단)
        ═════════════════════════════════ */
        function makeCell(text, className) {
            const td = document.createElement('td');
            td.textContent = text ?? '';
            if (className) td.className = className;
            return td;
        }

        function makeStatusLightCell(session, studentKey) {
            const td = document.createElement('td');
            const wrap = document.createElement('span');
            const dot = document.createElement('span');
            dot.className = 'light-dot';
            const label = document.createElement('span');
            const state = session ? session.focusState : null;
            if (state === 'away') { wrap.className = 'status-light light-away'; label.textContent = '이탈 중!'; }
            else if (state === 'active') { wrap.className = 'status-light light-active'; label.textContent = '응시 중'; }
            else if (state === 'offline') { wrap.className = 'status-light light-offline'; label.textContent = '접속 종료'; }
            else { wrap.className = 'status-light light-offline'; label.textContent = '미접속'; }
            wrap.appendChild(dot);
            wrap.appendChild(label);
            td.appendChild(wrap);
            const count = session ? Number(session.awayCount || 0) : 0;
            if (count > 0) {
                const c = document.createElement('span');
                c.className = count >= 5 ? 'away-count-text high' : 'away-count-text';
                c.textContent = count >= 5 ? `⚠️ 누적 이탈 ${count}회` : `누적 이탈 ${count}회`;
                if (count >= 5) td.appendChild(document.createElement('br'));
                td.appendChild(c);
            }
            // 접속 중이거나 이탈 중인 학생에게만 [종료] 버튼 표시
            if (studentKey && (state === 'active' || state === 'away')) {
                const endBtn = document.createElement('button');
                endBtn.className = 'end-session-btn';
                endBtn.textContent = '⏹ 접속 종료';
                endBtn.addEventListener('click', () => forceEndStudent(studentKey, session));
                td.appendChild(document.createElement('br'));
                td.appendChild(endBtn);
            }
            return td;
        }

        // 교사가 학생의 시험 접속을 강제로 종료 (학생 화면은 자동 로그아웃됨)
        async function forceEndStudent(studentKey, session) {
            const who = (session && session.name) ? `${session.name} 학생` : '이 학생';
            if (!confirm(`${who}의 시험 접속을 종료할까요?\n학생 화면은 자동으로 로그아웃되며, 작성 중이던 글은 임시저장되어 있어 다음 접속 때 이어쓸 수 있습니다.`)) return;
            try {
                await ensureTeacherLogin();
            } catch (e) { return; }
            database.ref(`sessions/${subjKey}/${studentKey}`).update({
                forceLogout: true,
                focusState: 'offline',
                updatedAt: firebase.database.ServerValue.TIMESTAMP
            }).catch((err) => alert('종료 실패: ' + err.message));
        }

        function getSubmissionList(evalData) {
            if (!evalData || !evalData.submissions) return [];
            return Object.values(evalData.submissions)
                .sort((a, b) => (a.submittedAt || 0) - (b.submittedAt || 0));
        }

        /* ═════════════════════════════════
           8. 제출 이력 모달 (신규 기능)
        ═════════════════════════════════ */
        function openHistory(studentKey, name) {
            const list = getSubmissionList(evaluations[studentKey]);
            const body = document.getElementById('history-body');
            body.innerHTML = '';
            document.getElementById('history-title').textContent =
                `📚 ${name} 학생의 제출 이력 (총 ${list.length}회)`;

            list.forEach((sub, idx) => {
                const item = document.createElement('div');
                item.className = 'history-item';

                const meta = document.createElement('div');
                meta.className = 'h-meta';
                const left = document.createElement('span');
                left.textContent = sub.questionNo
                    ? `📝 ${idx + 1}회차 제출 · 문항 ${sub.questionNo}`
                    : `📝 ${idx + 1}회차 제출`;
                const right = document.createElement('span');
                const t = sub.submittedAt ? new Date(sub.submittedAt) : null;
                right.textContent = t
                    ? `${t.getMonth() + 1}월 ${t.getDate()}일 ${String(t.getHours()).padStart(2, '0')}:${String(t.getMinutes()).padStart(2, '0')}`
                    : '';
                meta.appendChild(left);
                meta.appendChild(right);

                const ans = document.createElement('div');
                ans.className = 'h-answer';
                ans.textContent = sub.answer || '';

                item.appendChild(meta);
                item.appendChild(ans);

                const result = document.createElement('div');
                result.className = 'h-result';
                if (sub.status === '채점완료') {
                    result.textContent = `✅ ${sub.score}${sub.level ? ` (수준 ${sub.level})` : ''}\n${sub.feedback || ''}`;
                } else {
                    result.textContent = `⏳ ${sub.status || '채점대기'}`;
                }
                item.appendChild(result);

                body.appendChild(item);
            });

            document.getElementById('history-modal').classList.add('open');
        }

        document.getElementById('history-modal').addEventListener('click', (e) => {
            if (e.target.id === 'history-modal') e.target.classList.remove('open');
        });

        /* ═════════════════════════════════
           9. 표 그리기
        ═════════════════════════════════ */
        const expandedAnswers = new Set();   // 어떤 학생의 어떤 문항이 펼쳐져 있는지 기억
        const expandedGrading = new Set();   // 어떤 학생의 채점 메뉴가 펼쳐져 있는지 기억

        // 보기 필터: 바꾸는 즉시 표 갱신
        document.getElementById('filter-grade').addEventListener('change', renderTable);
        document.getElementById('filter-class').addEventListener('change', renderTable);
        document.getElementById('filter-reset-btn').addEventListener('click', () => {
            document.getElementById('filter-grade').value = '';
            document.getElementById('filter-class').value = '';
            renderTable();
        });

        function renderTable() {
            const tbody = document.getElementById('data-list');
            tbody.innerHTML = '';

            const keys = new Set([...Object.keys(sessions), ...Object.keys(evaluations)]);
            const rows = [];
            keys.forEach((key) => {
                const session = sessions[key] || null;
                const evalData = evaluations[key] || null;
                const info = (evalData && evalData.info) || session || {};
                const list = getSubmissionList(evalData);
                rows.push({ key, session, info, list, latest: list[list.length - 1] || null, count: list.length });
            });

            // 반 이름에서 숫자를 뽑아 비교 ("1", "1반", "전자과 1반" 모두 1반으로 인식)
            function classNum(v) {
                const m = String(v || '').match(/\d+/);
                return m ? Number(m[0]) : null;
            }

            // 필터 적용 (반 선택지는 1~7반 고정)
            const gSel = document.getElementById('filter-grade').value;
            const cSel = document.getElementById('filter-class').value;
            const visible = rows.filter((r) =>
                (!gSel || classNum(r.info.grade) === Number(gSel)) &&
                (!cSel || classNum(r.info.class) === Number(cSel))
            );
            document.getElementById('filter-status').textContent =
                (gSel || cSel) ? `필터 적용 중: ${visible.length}명 / 전체 ${rows.length}명` : '';

            visible.sort((a, b) => {
                // ① 학년 → ② 반(숫자를 인식해 2반이 10반보다 앞) → ③ 번호 순으로 정렬
                const g = Number(a.info.grade || 0) - Number(b.info.grade || 0);
                if (g !== 0) return g;
                const c = String(a.info.class || '').localeCompare(String(b.info.class || ''), 'ko', { numeric: true });
                if (c !== 0) return c;
                return Number(a.info.number || 0) - Number(b.info.number || 0);
            });

            document.getElementById('total-count').textContent = visible.length;
            document.getElementById('submitted-count').textContent = visible.filter((r) => r.count > 0).length;
            document.getElementById('away-now-count').textContent =
                visible.filter((r) => r.session && r.session.focusState === 'away').length;
            document.getElementById('away-history-count').textContent =
                visible.filter((r) => r.session && Number(r.session.awayCount || 0) > 0).length;
            document.getElementById('pending-count').textContent = collectPending().length;

            if (visible.length === 0) {
                const tr = document.createElement('tr');
                tr.className = 'empty-row';
                const td = document.createElement('td');
                td.colSpan = 9;
                td.textContent = rows.length === 0
                    ? '아직 접속하거나 제출한 학생이 없습니다. 기다리는 중...'
                    : '필터 조건에 맞는 학생이 없습니다. [전체 보기]를 눌러보세요.';
                tr.appendChild(td);
                tbody.appendChild(tr);
                return;
            }

            visible.forEach(({ key, session, info, list, latest, count }) => {
                const tr = document.createElement('tr');
                if (session && session.focusState === 'away') tr.className = 'row-away';

                const g = makeCell(info.grade ? `${info.grade}학년` : '-');
                g.style.fontWeight = 'bold';
                tr.appendChild(g);
                tr.appendChild(makeCell(info.class || '-'));
                tr.appendChild(makeCell(info.number ? `${info.number}번` : '-'));
                tr.appendChild(makeCell(info.name || '-'));
                tr.appendChild(makeStatusLightCell(session, key));

                // 답안 칸: 문항별 토글 (기본은 접힌 상태 → 표가 깔끔해짐)
                const answerCell = document.createElement('td');
                answerCell.className = 'answer-cell';

                if (count === 0) {
                    answerCell.textContent = '아직 제출 전입니다.';
                } else {
                    // 문항 번호별로 가장 최근 답안만 추출 (같은 문항 재제출 시 최신 것)
                    const latestByQ = {};
                    list.forEach((sub) => { latestByQ[sub.questionNo || 1] = sub; });

                    Object.keys(latestByQ).map(Number).sort((a, b) => a - b).forEach((qn) => {
                        const sub = latestByQ[qn];
                        const tKey = `${key}::${qn}`;
                        const isOpen = expandedAnswers.has(tKey);

                        const toggle = document.createElement('button');
                        toggle.className = 'q-answer-toggle' + (isOpen ? ' open' : '');
                        toggle.textContent = `${isOpen ? '▾' : '▸'} 문항 ${qn} 답안 ${isOpen ? '접기' : '보기'}`;
                        toggle.addEventListener('click', () => {
                            isOpen ? expandedAnswers.delete(tKey) : expandedAnswers.add(tKey);
                            renderTable();
                        });
                        answerCell.appendChild(toggle);

                        if (isOpen) {
                            const body = document.createElement('div');
                            body.className = 'q-answer-body';
                            body.textContent = sub.answer || '';
                            answerCell.appendChild(body);
                        }
                    });

                    const badge = document.createElement('span');
                    badge.className = 'attempt-badge';
                    badge.textContent = `📚 총 ${count}회 제출 — 이력 보기`;
                    badge.addEventListener('click', () => openHistory(key, info.name || '학생'));
                    answerCell.appendChild(badge);
                }
                tr.appendChild(answerCell);

                // 채점 현황 + 개별 채점 메뉴 (토글)
                const statusCell = document.createElement('td');
                const sb = document.createElement('span');
                if (!latest) { sb.className = 'badge-none'; sb.textContent = '미제출'; }
                else if (latest.status === '채점완료') { sb.className = 'badge-done'; sb.textContent = '채점완료'; }
                else if (latest.status === '채점실패') { sb.className = 'badge-fail'; sb.textContent = '채점실패'; }
                else { sb.className = 'badge-wait'; sb.textContent = latest.status || '채점대기'; }
                statusCell.appendChild(sb);

                if (count > 0) {
                    const gKey = `grade::${key}`;
                    const gOpen = expandedGrading.has(gKey);
                    const gToggle = document.createElement('button');
                    gToggle.className = 'grade-menu-toggle';
                    gToggle.textContent = gOpen ? '⚙️ 채점 메뉴 ▴' : '⚙️ 채점 메뉴 ▾';
                    gToggle.addEventListener('click', () => {
                        gOpen ? expandedGrading.delete(gKey) : expandedGrading.add(gKey);
                        renderTable();
                    });
                    statusCell.appendChild(document.createElement('br'));
                    statusCell.appendChild(gToggle);

                    if (gOpen) {
                        const name = info.name || '이';
                        const menu = document.createElement('div');

                        const b1 = document.createElement('button');
                        b1.className = 'mini-grade-btn';
                        b1.textContent = '⚡ 이 학생 채점';
                        b1.title = '이 학생의 미채점(대기·실패) 답안만 채점합니다.';
                        b1.addEventListener('click', () => gradeStudent(key, name));

                        const b2 = document.createElement('button');
                        b2.className = 'mini-grade-btn regrade';
                        b2.textContent = '🔄 이 학생 재채점';
                        b2.title = '이 학생의 모든 답안을 처음부터 다시 채점합니다.';
                        b2.addEventListener('click', () => regradeStudent(key, name));

                        const b3 = document.createElement('button');
                        b3.className = 'mini-grade-btn record';
                        const hasRecord = evaluations[key] && evaluations[key].record && evaluations[key].record.text;
                        b3.textContent = hasRecord ? '📋 세특 초안 보기' : '📋 세특 초안 생성';
                        b3.title = '서술형 답안을 바탕으로 생활기록부 세부능력·특기사항 초안을 만듭니다.';
                        b3.addEventListener('click', () => openRecord(key, info.name || '학생'));

                        menu.appendChild(b1);
                        menu.appendChild(b2);
                        menu.appendChild(b3);
                        statusCell.appendChild(menu);
                    }
                }
                tr.appendChild(statusCell);

                // 점수 / 수준
                const scoreCell = makeCell(latest ? latest.score : '-', 'score-cell');
                if (latest && latest.level) {
                    const lv = document.createElement('span');
                    lv.className = 'level-badge';
                    lv.textContent = `수준 ${latest.level}`;
                    scoreCell.appendChild(document.createElement('br'));
                    scoreCell.appendChild(lv);
                }
                tr.appendChild(scoreCell);

                tr.appendChild(makeCell(latest ? latest.feedback : '-', 'feedback-cell'));
                tbody.appendChild(tr);
            });
        }
    </script>
</body>

</html>
