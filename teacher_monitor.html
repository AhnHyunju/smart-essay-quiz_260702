<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교사용 실시간 모니터링 시스템</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f1f5f9;
            padding: 20px;
        }

        .monitor-box {
            max-width: 1300px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        h2 {
            color: #1e3a8a;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        .summary-bar {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 14px;
            color: #475569;
            margin-top: 10px;
        }

        .summary-bar strong {
            color: #1e3a8a;
        }

        .summary-bar .alert-count strong {
            color: #dc2626;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 10px;
            border: 1px solid #cbd5e1;
            text-align: center;
            font-size: 14px;
        }

        th {
            background-color: #f8fafc;
            color: #334155;
        }

        tr.row-away {
            background-color: #fef2f2;
        }

        .answer-cell {
            text-align: left;
            max-width: 300px;
            word-break: break-word;
        }

        .feedback-cell {
            text-align: left;
            font-size: 13px;
            color: #475569;
        }

        .score-cell {
            color: #b91c1c;
            font-weight: bold;
        }

        .badge-wait {
            background: #fef3c7;
            color: #d97706;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .badge-none {
            background: #f1f5f9;
            color: #64748b;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .attempt-badge {
            display: inline-block;
            background: #eff6ff;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
            border-radius: 10px;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: bold;
            margin-top: 4px;
        }

        /* ── 응시 상태 표시등 ── */
        .status-light {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
        }

        .light-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .light-active .light-dot {
            background: #22c55e;
        }

        .light-active {
            color: #15803d;
        }

        .light-away .light-dot {
            background: #dc2626;
            animation: pulse-red 0.8s infinite;
            box-shadow: 0 0 6px rgba(220, 38, 38, 0.7);
        }

        .light-away {
            color: #b91c1c;
        }

        .light-offline .light-dot {
            background: #94a3b8;
        }

        .light-offline {
            color: #64748b;
        }

        @keyframes pulse-red {
            50% {
                opacity: 0.25;
            }
        }

        .away-count-text {
            font-size: 11px;
            color: #b91c1c;
            display: block;
            margin-top: 3px;
        }

        .empty-row td {
            color: #94a3b8;
            padding: 30px;
        }
    </style>
</head>

<body>
    <div class="monitor-box">
        <h2>🖥️ 실시간 AI 채점 및 서술형 모니터링 현황 (<span id="subj">과목</span>)</h2>
        <div class="summary-bar">
            <span>👥 접속/제출 인원: <strong id="total-count">0</strong>명</span>
            <span>📨 답안 제출: <strong id="submitted-count">0</strong>명</span>
            <span class="alert-count">🚨 이탈 감지: <strong id="away-now-count">0</strong>명</span>
        </div>
        <table>
            <thead>
                <tr>
                    <th>학년</th>
                    <th>반</th>
                    <th>번호</th>
                    <th>이름</th>
                    <th>응시 상태</th>
                    <th>제출한 서술형 답안 내용 (최신)</th>
                    <th>AI 채점 현황</th>
                    <th>점수</th>
                    <th>Gemini 맞춤 피드백</th>
                </tr>
            </thead>
            <tbody id="data-list"></tbody>
        </table>
    </div>

    <script>
        /* ═════════════════════════════════
           1. Firebase 초기화
           (student_quiz.html과 반드시 동일한 설정)
        ═════════════════════════════════ */
        const firebaseConfig = {
            apiKey: "AIzaSyDArJnFmo2Ma9EFbGeHCL39IQap6dOzcOM",
            authDomain: "homework-monitor-57f4b.firebaseapp.com",
            databaseURL: "https://homework-monitor-57f4b-default-rtdb.firebaseio.com",
            projectId: "homework-monitor-57f4b",
            storageBucket: "homework-monitor-57f4b.firebasestorage.app",
            messagingSenderId: "692470692095",
            appId: "1:692470692095:web:da383ef62a3bd45a23b4ca"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        /* ═════════════════════════════════
           2. 과목 결정 (학생 페이지와 동일한 규칙)
        ═════════════════════════════════ */
        const VALID_SUBJECTS = ['통합사회', '사회와 문화'];
        const urlParams = new URLSearchParams(window.location.search);
        const requested = urlParams.get('subject');
        const subj = VALID_SUBJECTS.includes(requested) ? requested : VALID_SUBJECTS[0];
        document.getElementById('subj').textContent = subj;

        // 학생 페이지의 sanitizeKey와 반드시 동일해야 경로가 맞습니다.
        function sanitizeKey(str) {
            return String(str).replace(/[.#$\[\]\/\s]/g, '_');
        }
        const subjKey = sanitizeKey(subj);

        /* ═════════════════════════════════
           3. 데이터 저장소 (세션 + 제출 이력)
           두 경로 중 어느 쪽이 갱신되어도 표를 다시 그림
        ═════════════════════════════════ */
        let sessions = {};     // sessions/{과목}      → 접속·이탈 상태
        let evaluations = {};  // evaluations/{과목}   → 제출 이력(누적)

        database.ref(`sessions/${subjKey}`).on('value', (snap) => {
            sessions = snap.val() || {};
            renderTable();
        });

        database.ref(`evaluations/${subjKey}`).on('value', (snap) => {
            evaluations = snap.val() || {};
            renderTable();
        });

        /* ═════════════════════════════════
           4. 렌더링 헬퍼
           textContent 사용 → 학생 입력이 HTML로
           실행되지 않도록 방지 (XSS 차단)
        ═════════════════════════════════ */
        function makeCell(text, className) {
            const td = document.createElement('td');
            td.textContent = text ?? '';
            if (className) td.className = className;
            return td;
        }

        function makeStatusLightCell(session) {
            const td = document.createElement('td');
            const wrap = document.createElement('span');
            const dot = document.createElement('span');
            dot.className = 'light-dot';
            const label = document.createElement('span');

            const state = session ? session.focusState : null;
            if (state === 'away') {
                wrap.className = 'status-light light-away';
                label.textContent = '이탈 중!';
            } else if (state === 'active') {
                wrap.className = 'status-light light-active';
                label.textContent = '응시 중';
            } else if (state === 'offline') {
                wrap.className = 'status-light light-offline';
                label.textContent = '접속 종료';
            } else {
                wrap.className = 'status-light light-offline';
                label.textContent = '미접속';
            }
            wrap.appendChild(dot);
            wrap.appendChild(label);
            td.appendChild(wrap);

            const count = session ? Number(session.awayCount || 0) : 0;
            if (count > 0) {
                const countText = document.createElement('span');
                countText.className = 'away-count-text';
                countText.textContent = `누적 이탈 ${count}회`;
                td.appendChild(countText);
            }
            return td;
        }

        // submissions 객체에서 가장 최근 제출을 찾고 총 횟수를 셈
        function getLatestSubmission(evalData) {
            if (!evalData || !evalData.submissions) return { latest: null, count: 0 };
            const list = Object.values(evalData.submissions);
            list.sort((a, b) => (a.submittedAt || 0) - (b.submittedAt || 0));
            return { latest: list[list.length - 1], count: list.length };
        }

        /* ═════════════════════════════════
           5. 표 그리기
           세션(접속만 한 학생)과 제출 데이터를 합쳐서
           학생 1명당 1행으로 표시
        ═════════════════════════════════ */
        function renderTable() {
            const tbody = document.getElementById('data-list');
            tbody.innerHTML = '';

            // 두 경로의 학생 키 합집합
            const keys = new Set([...Object.keys(sessions), ...Object.keys(evaluations)]);

            const rows = [];
            keys.forEach((key) => {
                const session = sessions[key] || null;
                const evalData = evaluations[key] || null;
                const info = (evalData && evalData.info) || session || {};
                const { latest, count } = getLatestSubmission(evalData);
                rows.push({ key, session, info, latest, count });
            });

            // 반 → 번호 순 정렬
            rows.sort((a, b) => {
                const c = String(a.info.class || '').localeCompare(String(b.info.class || ''), 'ko');
                if (c !== 0) return c;
                return Number(a.info.number || 0) - Number(b.info.number || 0);
            });

            // 상단 요약 수치
            document.getElementById('total-count').textContent = rows.length;
            document.getElementById('submitted-count').textContent =
                rows.filter((r) => r.count > 0).length;
            document.getElementById('away-now-count').textContent =
                rows.filter((r) => r.session && r.session.focusState === 'away').length;

            if (rows.length === 0) {
                const tr = document.createElement('tr');
                tr.className = 'empty-row';
                const td = document.createElement('td');
                td.colSpan = 9;
                td.textContent = '아직 접속하거나 제출한 학생이 없습니다. 기다리는 중...';
                tr.appendChild(td);
                tbody.appendChild(tr);
                return;
            }

            rows.forEach(({ session, info, latest, count }) => {
                const tr = document.createElement('tr');
                if (session && session.focusState === 'away') tr.className = 'row-away';

                const gradeCell = makeCell(info.grade ? `${info.grade}학년` : '-');
                gradeCell.style.fontWeight = 'bold';
                tr.appendChild(gradeCell);

                tr.appendChild(makeCell(info.class || '-'));
                tr.appendChild(makeCell(info.number ? `${info.number}번` : '-'));
                tr.appendChild(makeCell(info.name || '-'));
                tr.appendChild(makeStatusLightCell(session));

                // 최신 답안 + 제출 횟수 배지
                const answerCell = makeCell(latest ? latest.answer : '아직 제출 전입니다.', 'answer-cell');
                if (count > 0) {
                    const badge = document.createElement('span');
                    badge.className = 'attempt-badge';
                    badge.textContent = `총 ${count}회 제출 (이력 보관 중)`;
                    answerCell.appendChild(document.createElement('br'));
                    answerCell.appendChild(badge);
                }
                tr.appendChild(answerCell);

                // 채점 현황
                const statusCell = document.createElement('td');
                const statusBadge = document.createElement('span');
                statusBadge.className = latest ? 'badge-wait' : 'badge-none';
                statusBadge.textContent = latest ? (latest.status || '') : '미제출';
                statusCell.appendChild(statusBadge);
                tr.appendChild(statusCell);

                tr.appendChild(makeCell(latest ? latest.score : '-', 'score-cell'));
                tr.appendChild(makeCell(latest ? latest.feedback : '-', 'feedback-cell'));

                tbody.appendChild(tr);
            });
        }
    </script>
</body>

</html>
