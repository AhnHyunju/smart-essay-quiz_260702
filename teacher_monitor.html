<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교사용 실시간 모니터링 시스템</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f1f5f9;
            padding: 20px;
        }

        .monitor-box {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        h2 {
            color: #1e3a8a;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th,
        td {
            padding: 12px;
            border: 1px solid #cbd5e1;
            text-align: center;
        }

        th {
            background-color: #f8fafc;
            color: #334155;
        }

        .answer-cell {
            text-align: left;
            max-width: 300px;
            word-break: break-word;
        }

        .feedback-cell {
            text-align: left;
            font-size: 13px;
            color: #475569;
        }

        .score-cell {
            color: #b91c1c;
            font-weight: bold;
        }

        .badge-wait {
            background: #fef3c7;
            color: #d97706;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .empty-row td {
            color: #94a3b8;
            padding: 30px;
        }

        .count-info {
            font-size: 14px;
            color: #64748b;
            margin-top: 8px;
        }
    </style>
</head>

<body>
    <div class="monitor-box">
        <h2>🖥️ 실시간 AI 채점 및 서술형 모니터링 현황 (<span id="subj">과목</span>)</h2>
        <p class="count-info">제출 인원: <strong id="submit-count">0</strong>명</p>
        <table>
            <thead>
                <tr>
                    <th>학년</th>
                    <th>반</th>
                    <th>번호</th>
                    <th>이름</th>
                    <th>제출한 서술형 답안 내용</th>
                    <th>AI 채점 현황</th>
                    <th>점수</th>
                    <th>Gemini 맞춤 피드백</th>
                </tr>
            </thead>
            <tbody id="data-list"></tbody>
        </table>
    </div>

    <script>
        /* ─────────────────────────────
           1. Firebase 초기화
        ───────────────────────────── */
        const firebaseConfig = {
            apiKey: "AIzaSyA74CrVcE1oSf2BZFFdf87fyCn3PkKO7yg",
            authDomain: "homework-monitor.firebaseapp.com",
            databaseURL: "https://homework-monitor-default-rtdb.firebaseio.com",
            projectId: "homework-monitor",
            storageBucket: "homework-monitor.appspot.com"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        /* ─────────────────────────────
           2. 과목 결정 (학생 페이지와 동일한 규칙)
        ───────────────────────────── */
        const VALID_SUBJECTS = ['통합사회', '사회와 문화'];
        const urlParams = new URLSearchParams(window.location.search);
        const requested = urlParams.get('subject');
        const subj = VALID_SUBJECTS.includes(requested) ? requested : VALID_SUBJECTS[0];
        document.getElementById('subj').textContent = subj;

        // 학생 페이지의 sanitizeKey와 반드시 동일해야 경로가 맞습니다.
        function sanitizeKey(str) {
            return String(str).replace(/[.#$\[\]\/\s]/g, '_');
        }

        /* ─────────────────────────────
           3. 셀 생성 헬퍼
           textContent를 사용해 학생 입력이 HTML로
           실행되지 않도록 방지합니다. (XSS 차단)
        ───────────────────────────── */
        function makeCell(text, className) {
            const td = document.createElement('td');
            td.textContent = text ?? '';
            if (className) td.className = className;
            return td;
        }

        function renderEmptyRow(tbody) {
            const tr = document.createElement('tr');
            tr.className = 'empty-row';
            const td = document.createElement('td');
            td.colSpan = 8;
            td.textContent = '아직 제출된 답안이 없습니다. 학생 제출을 기다리는 중...';
            tr.appendChild(td);
            tbody.appendChild(tr);
        }

        /* ─────────────────────────────
           4. 실시간 구독
           과목별 경로(evaluations/{과목})만 구독하므로
           다른 과목 데이터를 내려받아 걸러낼 필요가 없습니다.
        ───────────────────────────── */
        database.ref(`evaluations/${sanitizeKey(subj)}`).on('value', (snapshot) => {
            const tbody = document.getElementById('data-list');
            tbody.innerHTML = '';

            // 반 → 번호 순으로 정렬해서 표시
            const rows = [];
            snapshot.forEach((child) => rows.push(child.val()));
            rows.sort((a, b) => {
                const classCompare = String(a.class).localeCompare(String(b.class), 'ko');
                if (classCompare !== 0) return classCompare;
                return Number(a.number) - Number(b.number);
            });

            document.getElementById('submit-count').textContent = rows.length;

            if (rows.length === 0) {
                renderEmptyRow(tbody);
                return;
            }

            rows.forEach((data) => {
                const tr = document.createElement('tr');

                const gradeCell = makeCell(`${data.grade}학년`);
                gradeCell.style.fontWeight = 'bold';
                tr.appendChild(gradeCell);

                tr.appendChild(makeCell(data.class));
                tr.appendChild(makeCell(`${data.number}번`));
                tr.appendChild(makeCell(data.name));
                tr.appendChild(makeCell(data.answer, 'answer-cell'));

                const statusCell = document.createElement('td');
                const badge = document.createElement('span');
                badge.className = 'badge-wait';
                badge.textContent = data.status ?? '';
                statusCell.appendChild(badge);
                tr.appendChild(statusCell);

                tr.appendChild(makeCell(data.score, 'score-cell'));
                tr.appendChild(makeCell(data.feedback, 'feedback-cell'));

                tbody.appendChild(tr);
            });
        });
    </script>
</body>

</html>
