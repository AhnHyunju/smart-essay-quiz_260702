<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교사용 실시간 모니터링 시스템</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f1f5f9;
            padding: 20px;
        }

        .monitor-box {
            max-width: 1300px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        h2 {
            color: #1e3a8a;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
            margin-top: 0;
        }

        .summary-bar {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 14px;
            color: #475569;
            margin-top: 10px;
        }

        .summary-bar strong {
            color: #1e3a8a;
        }

        .summary-bar .alert-count strong {
            color: #dc2626;
        }

        /* ── AI 채점 제어판 ── */
        .grading-panel {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px 14px;
            margin-top: 14px;
        }

        .grading-panel label {
            font-size: 13px;
            color: #334155;
            font-weight: bold;
        }

        .api-key-input {
            flex: 1;
            min-width: 220px;
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 13px;
        }

        .panel-btn {
            border: none;
            border-radius: 6px;
            padding: 9px 14px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            color: white;
            background: #1e3a8a;
        }

        .panel-btn:hover:not(:disabled) {
            background: #172554;
        }

        .panel-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .panel-btn.grade {
            background: #7c3aed;
        }

        .panel-btn.grade:hover:not(:disabled) {
            background: #6d28d9;
        }

        .auto-grade-label {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            color: #334155;
        }

        .grading-status {
            font-size: 13px;
            color: #7c3aed;
            font-weight: bold;
            width: 100%;
        }

        .login-note {
            font-size: 12px;
            color: #b45309;
            width: 100%;
        }

        .q-item {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .q-item .q-no {
            font-size: 13px;
            font-weight: bold;
            color: #1e3a8a;
            padding-top: 9px;
            white-space: nowrap;
        }

        .q-item textarea {
            flex: 1;
            min-height: 44px;
            padding: 8px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            resize: vertical;
            box-sizing: border-box;
        }

        .table-scroll {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            min-width: 1000px;
        }

        th,
        td {
            padding: 10px;
            border: 1px solid #cbd5e1;
            text-align: center;
            font-size: 14px;
        }

        th {
            background-color: #f8fafc;
            color: #334155;
        }

        tr.row-away {
            background-color: #fef2f2;
        }

        .answer-cell {
            text-align: left;
            max-width: 300px;
            word-break: break-word;
        }

        .feedback-cell {
            text-align: left;
            font-size: 13px;
            color: #475569;
            max-width: 260px;
        }

        .score-cell {
            color: #b91c1c;
            font-weight: bold;
            white-space: nowrap;
        }

        .level-badge {
            display: inline-block;
            background: #ede9fe;
            color: #6d28d9;
            border-radius: 6px;
            padding: 2px 7px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 4px;
        }

        .badge-wait {
            background: #fef3c7;
            color: #d97706;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .badge-done {
            background: #dcfce7;
            color: #15803d;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .badge-fail {
            background: #fee2e2;
            color: #b91c1c;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .badge-none {
            background: #f1f5f9;
            color: #64748b;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        /* 문항별 답안 토글 */
        .q-answer-toggle {
            display: block;
            width: 100%;
            text-align: left;
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            padding: 6px 10px;
            margin: 3px 0;
            font-size: 13px;
            font-weight: bold;
            color: #1e3a8a;
            cursor: pointer;
        }

        .q-answer-toggle:hover {
            background: #eff6ff;
        }

        .q-answer-toggle.open {
            background: #eff6ff;
            border-color: #93c5fd;
        }

        .q-answer-body {
            text-align: left;
            font-size: 13px;
            color: #334155;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-top: none;
            border-radius: 0 0 6px 6px;
            padding: 8px 10px;
            margin: -3px 0 4px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .attempt-badge {
            display: inline-block;
            background: #eff6ff;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
            border-radius: 10px;
            padding: 3px 9px;
            font-size: 11px;
            font-weight: bold;
            margin-top: 5px;
            cursor: pointer;
        }

        .attempt-badge:hover {
            background: #1d4ed8;
            color: white;
        }

        .status-light {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
        }

        .light-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .light-active .light-dot {
            background: #22c55e;
        }

        .light-active {
            color: #15803d;
        }

        .light-away .light-dot {
            background: #dc2626;
            animation: pulse-red 0.8s infinite;
            box-shadow: 0 0 6px rgba(220, 38, 38, 0.7);
        }

        .light-away {
            color: #b91c1c;
        }

        .light-offline .light-dot {
            background: #94a3b8;
        }

        .light-offline {
            color: #64748b;
        }

        @keyframes pulse-red {
            50% {
                opacity: 0.25;
            }
        }

        .away-count-text {
            font-size: 11px;
            color: #b91c1c;
            display: block;
            margin-top: 3px;
        }

        /* 누적 이탈 5회 이상: 눈에 띄게 강조 */
        .away-count-text.high {
            font-size: 12px;
            font-weight: bold;
            color: #ffffff;
            background: #dc2626;
            border-radius: 6px;
            padding: 2px 6px;
            display: inline-block;
        }

        .empty-row td {
            color: #94a3b8;
            padding: 30px;
        }

        /* ── 이력 모달 ── */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 16px;
        }

        .modal.open {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 12px;
            max-width: 640px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            color: #1e3a8a;
            margin-top: 0;
        }

        .history-item {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
            background: #f8fafc;
        }

        .history-item .h-meta {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 6px;
        }

        .history-item .h-answer {
            font-size: 14px;
            color: #0f172a;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .history-item .h-result {
            margin-top: 8px;
            font-size: 13px;
            color: #475569;
            border-top: 1px dashed #cbd5e1;
            padding-top: 8px;
        }

        .close-btn {
            background: #64748b;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 6px;
        }
    </style>
</head>

<body>
    <div class="monitor-box">
        <h2>🖥️ 실시간 AI 채점 및 서술형 모니터링 현황 (<span id="subj">과목</span>)</h2>
        <div class="summary-bar">
            <span>👥 접속/제출 인원: <strong id="total-count">0</strong>명</span>
            <span>📨 답안 제출: <strong id="submitted-count">0</strong>명</span>
            <span class="alert-count">🚨 지금 이탈 중: <strong id="away-now-count">0</strong>명</span>
            <span class="alert-count">⚠️ 이탈 기록 있음: <strong id="away-history-count">0</strong>명</span>
            <span>⏳ 채점 대기: <strong id="pending-count">0</strong>건</span>
        </div>

        <!-- 문항 관리 패널 -->
        <div class="grading-panel" style="border-color:#bfdbfe; background:#eff6ff;">
            <label>📝 문항 관리:</label>
            <label style="font-weight:normal;">문항 수
                <select id="q-count" style="padding:7px; border:1px solid #cbd5e1; border-radius:6px; font-size:13px; margin-left:4px;"></select>
            </label>
            <button class="panel-btn" id="q-toggle-btn">문항 입력란 열기 ▾</button>
            <button class="panel-btn" id="q-save-btn" style="background:#0891b2;">💾 문항 저장 (학생 화면에 반영)</button>
            <button class="panel-btn" id="q-reset-btn" style="background:#64748b;">기본 예시로 되돌리기</button>
            <span class="grading-status" id="q-status"></span>
            <div id="q-editor" style="display:none; width:100%; margin-top:8px;"></div>
        </div>

        <!-- 시험 모드(이탈 감지) 패널 -->
        <div class="grading-panel" style="border-color:#fecaca; background:#fef2f2;">
            <label>🛡️ 시험 모드:</label>
            <button class="panel-btn" id="mode-btn" style="background:#dc2626;">불러오는 중...</button>
            <span class="grading-status" id="mode-desc"></span>
        </div>

        <!-- AI 채점 제어판 -->
        <div class="grading-panel">
            <label>🤖 Gemini AI 채점:</label>
            <input type="password" id="api-key" class="api-key-input"
                placeholder="Gemini API 키를 붙여넣으세요 (이 컴퓨터에만 저장됩니다)">
            <button class="panel-btn" id="save-key-btn">키 저장</button>
            <button class="panel-btn grade" id="grade-btn">⚡ 미채점 답안 AI 채점 실행</button>
            <label class="auto-grade-label">
                <input type="checkbox" id="auto-grade"> 새 제출 자동 채점
            </label>
            <span class="grading-status" id="grading-status"></span>
            <span class="login-note" id="login-note"></span>
        </div>

        <div class="table-scroll">
            <table>
                <thead>
                    <tr>
                        <th>학년</th>
                        <th>반</th>
                        <th>번호</th>
                        <th>이름</th>
                        <th>응시 상태</th>
                        <th>제출한 서술형 답안 내용 (최신)</th>
                        <th>AI 채점 현황</th>
                        <th>점수 / 수준</th>
                        <th>Gemini 맞춤 피드백</th>
                    </tr>
                </thead>
                <tbody id="data-list"></tbody>
            </table>
        </div>
    </div>

    <!-- 제출 이력 모달 -->
    <div id="history-modal" class="modal">
        <div class="modal-content">
            <h3 id="history-title">📚 제출 이력</h3>
            <div id="history-body"></div>
            <button class="close-btn" onclick="document.getElementById('history-modal').classList.remove('open')">닫기</button>
        </div>
    </div>

    <script>
        /* ═════════════════════════════════
           1. 과목별 문항·성취기준 (채점 기준으로 사용)
        ═════════════════════════════════ */
        const SUBJECT_DATA = {
            '통합사회': {
                defaultQuestions: [
                    '정보 사회의 확산에 따라 나타날 수 있는 긍정적 측면과 부정적 측면에 대해 각각 한 가지씩 서술하시오.',
                    '인공지능 기술의 발전이 미래의 직업 세계에 가져올 변화를 예측하고, 이에 대비하는 개인적 차원의 노력을 근거와 함께 서술하시오.',
                    '지속가능한 미래 사회를 만들기 위해 개인과 정부가 할 수 있는 노력을 각각 한 가지씩 구체적 사례를 들어 서술하시오.'
                ],
                standards: `[성취기준] 10통사09-02: 미래 사회가 인류의 삶에 미칠 영향을 예측하고, 대처 자세를 탐구한다.
[성취수준 A] 미래 사회의 긍정적/부정적 모습을 다각적으로 탐색하고 논리적 근거와 실천적 대안을 훌륭히 제시함.
[성취수준 B] 긍정적/부정적 측면을 모두 서술하고 각각에 타당한 근거를 제시함.
[성취수준 C] 미래 사회의 보편적 특징을 알고 관련 현상을 매칭하여 설명할 수 있음.
[성취수준 D] 긍정적 또는 부정적 측면 중 한 가지만 부분적으로 서술함.
[성취수준 E] 정보 사회의 특징을 언급하나 문항의 요구와 연결하지 못함.`
            },
            '사회와 문화': {
                defaultQuestions: [
                    '현대 사회의 문화 변동의 원인을 내부적 요인과 외부적 요인으로 구분하여 논하시오.',
                    '문화 접변의 결과로 나타나는 문화 공존, 문화 동화, 문화 융합 중 두 가지를 골라 실제 사례를 들어 설명하시오.',
                    '대중문화의 순기능과 역기능을 각각 한 가지씩 사례를 들어 서술하시오.'
                ],
                standards: `[성취기준] 12사문04-01: 문화 변동의 다양한 원인과 양상을 파악하고 이해한다.
[성취수준 A] 내재적 원인과 외재적 원인을 명확히 구분하고 문화 융합 사례를 입체적으로 분석함.
[성취수준 B] 내부적/외부적 요인을 구분하여 서술하고 적절한 사례를 제시함.
[성취수준 C] 문화 변동의 대표적인 원인을 제시된 사례와 연결하여 설명할 수 있음.
[성취수준 D] 내부적 또는 외부적 요인 중 한 가지만 부분적으로 서술함.
[성취수준 E] 문화 변동이라는 개념을 언급하나 원인을 구분하지 못함.`
            }
        };

        /* ═════════════════════════════════
           2. Firebase 초기화
        ═════════════════════════════════ */
        const firebaseConfig = {
            apiKey: "AIzaSyDArJnFmo2Ma9EFbGeHCL39IQap6dOzcOM",
            authDomain: "homework-monitor-57f4b.firebaseapp.com",
            databaseURL: "https://homework-monitor-57f4b-default-rtdb.firebaseio.com",
            projectId: "homework-monitor-57f4b",
            storageBucket: "homework-monitor-57f4b.firebasestorage.app",
            messagingSenderId: "692470692095",
            appId: "1:692470692095:web:da383ef62a3bd45a23b4ca"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        /* ═════════════════════════════════
           3. 과목 결정
        ═════════════════════════════════ */
        const VALID_SUBJECTS = ['통합사회', '사회와 문화'];
        const urlParams = new URLSearchParams(window.location.search);
        const requested = urlParams.get('subject');
        const subj = VALID_SUBJECTS.includes(requested) ? requested : VALID_SUBJECTS[0];
        document.getElementById('subj').textContent = subj;

        function sanitizeKey(str) {
            return String(str).replace(/[.#$\[\]\/\s]/g, '_');
        }
        const subjKey = sanitizeKey(subj);

        /* ═════════════════════════════════
           4. 교사 로그인 상태 확인
           (데이터 수정 권한 = 로그인 필요)
        ═════════════════════════════════ */
        let teacherLoggedIn = false;

        function updateLoginNote() {
            const note = document.getElementById('login-note');
            if (teacherLoggedIn) {
                note.textContent = '';
            } else {
                note.textContent = '⚠️ 채점 결과를 저장하려면 교사 구글 로그인이 필요합니다. 채점 버튼을 누르면 로그인 창이 뜹니다.';
            }
        }

        auth.onAuthStateChanged((user) => {
            teacherLoggedIn = !!user;
            updateLoginNote();
        });

        function ensureTeacherLogin() {
            if (teacherLoggedIn) return Promise.resolve();
            const provider = new firebase.auth.GoogleAuthProvider();
            return auth.signInWithPopup(provider);
        }

        /* ═════════════════════════════════
           4-1. 문항 관리 (신규 기능)
           - 문항 수를 1~10개로 조절하고 내용을 직접 출제
           - 저장하면 questions/{과목} 경로에 기록되어
             학생 화면에 실시간 반영됨
        ═════════════════════════════════ */
        let editorQuestions = SUBJECT_DATA[subj].defaultQuestions.slice();

        const qCountSelect = document.getElementById('q-count');
        for (let i = 1; i <= 10; i++) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = `${i}문항`;
            qCountSelect.appendChild(opt);
        }

        function setQStatus(msg) {
            document.getElementById('q-status').textContent = msg;
        }

        function renderQuestionEditor() {
            const editor = document.getElementById('q-editor');
            editor.innerHTML = '';
            qCountSelect.value = editorQuestions.length;
            editorQuestions.forEach((q, i) => {
                const row = document.createElement('div');
                row.className = 'q-item';
                const no = document.createElement('span');
                no.className = 'q-no';
                no.textContent = `문항 ${i + 1}`;
                const ta = document.createElement('textarea');
                ta.value = q;
                ta.placeholder = '서술형 문항 내용을 입력하세요.';
                ta.addEventListener('input', () => { editorQuestions[i] = ta.value; });
                row.appendChild(no);
                row.appendChild(ta);
                editor.appendChild(row);
            });
        }

        // 문항 수 변경: 줄이면 뒤 문항 제거, 늘리면 빈 입력란 추가
        qCountSelect.addEventListener('change', () => {
            const n = Number(qCountSelect.value);
            while (editorQuestions.length > n) editorQuestions.pop();
            while (editorQuestions.length < n) editorQuestions.push('');
            renderQuestionEditor();
            document.getElementById('q-editor').style.display = 'block';
            document.getElementById('q-toggle-btn').textContent = '문항 입력란 접기 ▴';
        });

        document.getElementById('q-toggle-btn').addEventListener('click', () => {
            const editor = document.getElementById('q-editor');
            const open = editor.style.display !== 'none';
            editor.style.display = open ? 'none' : 'block';
            document.getElementById('q-toggle-btn').textContent =
                open ? '문항 입력란 열기 ▾' : '문항 입력란 접기 ▴';
        });

        document.getElementById('q-reset-btn').addEventListener('click', () => {
            if (!confirm('기본 예시 문항 3개로 되돌릴까요? (저장을 눌러야 학생 화면에 반영됩니다)')) return;
            editorQuestions = SUBJECT_DATA[subj].defaultQuestions.slice();
            renderQuestionEditor();
            document.getElementById('q-editor').style.display = 'block';
        });

        document.getElementById('q-save-btn').addEventListener('click', async () => {
            const cleaned = editorQuestions.map((q) => q.trim());
            if (cleaned.some((q) => !q)) {
                alert('비어 있는 문항이 있습니다. 모든 문항의 내용을 입력해 주세요!');
                return;
            }
            try {
                await ensureTeacherLogin();
            } catch (e) {
                setQStatus('❌ 로그인이 취소되어 저장하지 못했습니다.');
                return;
            }
            database.ref(`questions/${subjKey}`).update({
                items: cleaned,
                updatedAt: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                setQStatus(`✅ ${cleaned.length}개 문항이 저장되어 학생 화면에 반영되었습니다.`);
            }).catch((err) => {
                setQStatus('❌ 저장 실패: ' + err.message);
            });
        });

        // 저장된 문항·시험 모드가 있으면 불러오기 (실시간 반영)
        let currentExamMode = 'lock';   // lock: 이탈 감지 켬 / free: 검색 허용

        database.ref(`questions/${subjKey}`).on('value', (snap) => {
            const data = snap.val();
            if (data && Array.isArray(data.items) && data.items.length > 0) {
                editorQuestions = data.items.slice(0, 10);
            }
            currentExamMode = (data && data.examMode === 'free') ? 'free' : 'lock';
            renderModeButton();
            renderQuestionEditor();
        });

        /* ═════════════════════════════════
           4-1. 시험 모드 전환 (이탈 감지 켜기/끄기)
           - questions/{과목}/examMode 에 저장 → 학생 화면에 실시간 반영
        ═════════════════════════════════ */
        function renderModeButton() {
            const btn = document.getElementById('mode-btn');
            const desc = document.getElementById('mode-desc');
            if (currentExamMode === 'lock') {
                btn.textContent = '🔒 화면 이탈 금지 모드 (누르면 검색 허용으로 전환)';
                btn.style.background = '#dc2626';
                desc.textContent = '학생이 다른 탭·창으로 이동하면 경고가 뜨고 이탈로 기록됩니다.';
            } else {
                btn.textContent = '🔓 검색 허용 모드 (누르면 이탈 금지로 전환)';
                btn.style.background = '#16a34a';
                desc.textContent = '학생이 자유롭게 검색할 수 있으며, 화면을 나가도 이탈로 기록되지 않습니다.';
            }
        }

        document.getElementById('mode-btn').addEventListener('click', async () => {
            try {
                await ensureTeacherLogin();
            } catch (e) {
                alert('모드 변경에는 교사 구글 로그인이 필요합니다.');
                return;
            }
            const next = currentExamMode === 'lock' ? 'free' : 'lock';
            database.ref(`questions/${subjKey}`).update({ examMode: next })
                .catch((err) => alert('모드 변경 실패: ' + err.message));
        });

        renderQuestionEditor();

        /* ═════════════════════════════════
           5. 실시간 데이터 구독
        ═════════════════════════════════ */
        let sessions = {};
        let evaluations = {};

        database.ref(`sessions/${subjKey}`).on('value', (snap) => {
            sessions = snap.val() || {};
            renderTable();
        });

        database.ref(`evaluations/${subjKey}`).on('value', (snap) => {
            evaluations = snap.val() || {};
            renderTable();
            maybeAutoGrade();
        });

        /* ═════════════════════════════════
           6. Gemini AI 채점 (핵심 신규 기능)
           - API 키는 이 브라우저(localStorage)에만 저장
           - 성취기준·성취수준을 기준으로 점수(10점 만점),
             성취수준(A~E), 피드백을 생성해 Firebase에 기록
        ═════════════════════════════════ */
        const keyInput = document.getElementById('api-key');
        keyInput.value = localStorage.getItem('gemini_api_key') || '';

        document.getElementById('save-key-btn').addEventListener('click', () => {
            localStorage.setItem('gemini_api_key', keyInput.value.trim());
            setGradingStatus('🔑 API 키가 이 컴퓨터에 저장되었습니다.');
        });

        function setGradingStatus(msg) {
            document.getElementById('grading-status').textContent = msg;
        }

        // 채점에 사용할 모델 목록 (앞의 것부터 시도, 실패 시 다음 모델로 자동 전환)
        // ※ gemini-2.0-flash는 2026년 6월 1일 서비스 종료됨
        const GEMINI_MODELS = ['gemini-2.5-flash', 'gemini-2.5-flash-lite', 'gemini-flash-latest'];
        let workingModelIndex = 0;

        async function callGemini(sub) {
            const apiKey = (keyInput.value || '').trim();
            if (!apiKey) throw new Error('API 키를 먼저 입력하고 [키 저장]을 눌러주세요.');

            // 학생이 답한 문항을 기준으로 채점 (문항 정보가 없는 예전 제출은 기본 1번 문항 사용)
            const questionText = sub.questionText || SUBJECT_DATA[subj].defaultQuestions[0];

            const prompt = `당신은 고등학교 사회과 서술형 평가를 채점하는 교사입니다.

[문항]
${questionText}

[채점 기준]
${SUBJECT_DATA[subj].standards}

[학생 답안]
${sub.answer}

위 성취기준과 성취수준 A~E를 근거로 학생 답안을 채점하세요.
반드시 아래 형식의 JSON만 출력하세요. 다른 설명이나 마크다운 기호는 절대 쓰지 마세요.
{"score": 0에서 10 사이의 정수, "level": "A"|"B"|"C"|"D"|"E", "feedback": "학생에게 존댓말로 전하는 2~3문장의 구체적 피드백. 잘한 점 1가지와 보완할 점 1가지를 포함"}`;

            // 현재 모델부터 시도하고, 모델 문제(404/한도 0 등)면 다음 모델로 자동 전환
            let data = null;
            let lastError = null;
            for (let i = workingModelIndex; i < GEMINI_MODELS.length; i++) {
                const model = GEMINI_MODELS[i];
                const res = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { temperature: 0.2 }
                        })
                    }
                );

                if (res.ok) {
                    workingModelIndex = i; // 성공한 모델을 기억해서 다음부터 바로 사용
                    data = await res.json();
                    break;
                }

                const errBody = await res.json().catch(() => ({}));
                const msg = errBody?.error?.message || '';
                lastError = `[${model}] HTTP ${res.status} — ${msg}`;

                // 키 자체가 잘못된 경우(400/403)는 모델을 바꿔도 소용없으니 즉시 중단
                if (res.status === 400 || res.status === 403) {
                    throw new Error('Gemini 호출 실패: ' + lastError);
                }
                // 그 외(모델 종료, 한도 0, 404 등)는 다음 모델로 재시도
            }

            if (!data) {
                throw new Error('Gemini 호출 실패 (모든 모델 시도함): ' + lastError);
            }
            const text = (data?.candidates?.[0]?.content?.parts?.[0]?.text || '')
                .replace(/```json|```/g, '').trim();
            const parsed = JSON.parse(text);
            if (typeof parsed.score !== 'number' || !parsed.level || !parsed.feedback) {
                throw new Error('채점 결과 형식이 올바르지 않습니다.');
            }
            return parsed;
        }

        // 채점 실패 원인을 선생님이 이해하기 쉬운 한글로 번역
        function explainGradingError(e) {
            const m = String((e && e.message) || e);
            if (m.includes('API 키를 먼저')) return 'API 키가 비어 있어요. 키를 입력하고 [키 저장]을 눌러주세요.';
            if (m.includes('API_KEY_INVALID') || m.includes('API key not valid') || m.includes('HTTP 400'))
                return 'API 키가 올바르지 않아요. aistudio.google.com에서 키를 다시 복사해 붙여넣어 주세요.';
            if (m.includes('Gemini 호출 실패') && m.includes('HTTP 403'))
                return 'API 키에 권한이 없어요. 키가 삭제되었거나 다른 프로젝트의 키일 수 있어요.';
            if (m.includes('HTTP 429') || m.toLowerCase().includes('quota') || m.includes('RESOURCE_EXHAUSTED'))
                return '무료 사용량 한도(분당 요청 수)에 잠시 걸렸어요. 1~2분 뒤 채점 버튼을 다시 눌러주세요.';
            if (m.includes('HTTP 404'))
                return 'AI 모델을 찾지 못했어요. 모델이 변경·종료되었을 수 있으니 알려주세요.';
            if (m.includes('HTTP 5') || m.toLowerCase().includes('overloaded') || m.includes('UNAVAILABLE'))
                return 'Gemini 서버가 지금 혼잡해요. 잠시 후 다시 실행해 주세요.';
            if (m.includes('Failed to fetch') || m.includes('NetworkError'))
                return '인터넷 연결 문제로 Gemini에 접속하지 못했어요. 네트워크를 확인해 주세요.';
            if (m.toUpperCase().includes('PERMISSION_DENIED'))
                return 'Firebase 창고에 결과를 기록할 권한이 없어요. 데이터베이스 규칙을 확인해 주세요.';
            if (m.includes('JSON') || m.includes('Unexpected token') || m.includes('형식이 올바르지'))
                return 'AI가 정해진 형식으로 답하지 않았어요. 다시 실행하면 대부분 해결됩니다.';
            return m;   // 알 수 없는 오류는 원문 그대로 표시
        }

        // 미채점(채점대기 또는 채점실패) 제출 목록 수집
        function collectPending() {
            const list = [];
            Object.entries(evaluations).forEach(([studentKey, evalData]) => {
                const subs = evalData.submissions || {};
                Object.entries(subs).forEach(([subId, sub]) => {
                    if (sub.status === '채점대기' || sub.status === '채점실패') {
                        list.push({ studentKey, subId, sub });
                    }
                });
            });
            return list;
        }

        let isGrading = false;

        async function runGrading() {
            if (isGrading) return;
            const pending = collectPending();
            if (pending.length === 0) {
                setGradingStatus('✅ 채점할 대기 답안이 없습니다.');
                return;
            }

            try {
                await ensureTeacherLogin();
            } catch (e) {
                setGradingStatus('❌ 교사 로그인이 취소되어 채점을 중단했습니다.');
                return;
            }

            isGrading = true;
            const btn = document.getElementById('grade-btn');
            btn.disabled = true;
            let done = 0, failed = 0, lastFailReason = '';

            for (const { studentKey, subId, sub } of pending) {
                setGradingStatus(`🤖 채점 중... (${done + failed + 1} / ${pending.length})`);
                const ref = database.ref(`evaluations/${subjKey}/${studentKey}/submissions/${subId}`);
                try {
                    const result = await callGemini(sub);
                    await ref.update({
                        status: '채점완료',
                        score: `${result.score} / 10점`,
                        level: result.level,
                        feedback: result.feedback,
                        gradedAt: firebase.database.ServerValue.TIMESTAMP
                    });
                    done++;
                } catch (e) {
                    failed++;
                    lastFailReason = explainGradingError(e);
                    await ref.update({
                        status: '채점실패',
                        feedback: '⚠️ 채점 실패 원인: ' + lastFailReason
                    }).catch(() => { });
                    // 키가 아예 잘못된 경우엔 반복해도 소용없으니 중단
                    if (String(e.message).includes('API 키') || String(e.message).includes('API key')) {
                        setGradingStatus('❌ ' + lastFailReason);
                        break;
                    }
                }
            }

            setGradingStatus(
                `🏁 채점 완료: 성공 ${done}건` +
                (failed ? `, 실패 ${failed}건 — 원인: ${lastFailReason} (다시 실행하면 재시도됩니다)` : '')
            );
            isGrading = false;
            btn.disabled = false;
        }

        document.getElementById('grade-btn').addEventListener('click', runGrading);

        // 자동 채점: 새 제출이 감지되면 자동 실행 (체크박스 켜져 있을 때만)
        let autoGradeTimer = null;
        function maybeAutoGrade() {
            if (!document.getElementById('auto-grade').checked) return;
            if (collectPending().length === 0) return;
            clearTimeout(autoGradeTimer);
            autoGradeTimer = setTimeout(runGrading, 1500); // 연속 제출을 묶어서 처리
        }

        /* ═════════════════════════════════
           7. 렌더링 (textContent 사용 → XSS 차단)
        ═════════════════════════════════ */
        function makeCell(text, className) {
            const td = document.createElement('td');
            td.textContent = text ?? '';
            if (className) td.className = className;
            return td;
        }

        function makeStatusLightCell(session) {
            const td = document.createElement('td');
            const wrap = document.createElement('span');
            const dot = document.createElement('span');
            dot.className = 'light-dot';
            const label = document.createElement('span');
            const state = session ? session.focusState : null;
            if (state === 'away') { wrap.className = 'status-light light-away'; label.textContent = '이탈 중!'; }
            else if (state === 'active') { wrap.className = 'status-light light-active'; label.textContent = '응시 중'; }
            else if (state === 'offline') { wrap.className = 'status-light light-offline'; label.textContent = '접속 종료'; }
            else { wrap.className = 'status-light light-offline'; label.textContent = '미접속'; }
            wrap.appendChild(dot);
            wrap.appendChild(label);
            td.appendChild(wrap);
            const count = session ? Number(session.awayCount || 0) : 0;
            if (count > 0) {
                const c = document.createElement('span');
                c.className = count >= 5 ? 'away-count-text high' : 'away-count-text';
                c.textContent = count >= 5 ? `⚠️ 누적 이탈 ${count}회` : `누적 이탈 ${count}회`;
                if (count >= 5) td.appendChild(document.createElement('br'));
                td.appendChild(c);
            }
            return td;
        }

        function getSubmissionList(evalData) {
            if (!evalData || !evalData.submissions) return [];
            return Object.values(evalData.submissions)
                .sort((a, b) => (a.submittedAt || 0) - (b.submittedAt || 0));
        }

        /* ═════════════════════════════════
           8. 제출 이력 모달 (신규 기능)
        ═════════════════════════════════ */
        function openHistory(studentKey, name) {
            const list = getSubmissionList(evaluations[studentKey]);
            const body = document.getElementById('history-body');
            body.innerHTML = '';
            document.getElementById('history-title').textContent =
                `📚 ${name} 학생의 제출 이력 (총 ${list.length}회)`;

            list.forEach((sub, idx) => {
                const item = document.createElement('div');
                item.className = 'history-item';

                const meta = document.createElement('div');
                meta.className = 'h-meta';
                const left = document.createElement('span');
                left.textContent = sub.questionNo
                    ? `📝 ${idx + 1}회차 제출 · 문항 ${sub.questionNo}`
                    : `📝 ${idx + 1}회차 제출`;
                const right = document.createElement('span');
                const t = sub.submittedAt ? new Date(sub.submittedAt) : null;
                right.textContent = t
                    ? `${t.getMonth() + 1}월 ${t.getDate()}일 ${String(t.getHours()).padStart(2, '0')}:${String(t.getMinutes()).padStart(2, '0')}`
                    : '';
                meta.appendChild(left);
                meta.appendChild(right);

                const ans = document.createElement('div');
                ans.className = 'h-answer';
                ans.textContent = sub.answer || '';

                item.appendChild(meta);
                item.appendChild(ans);

                const result = document.createElement('div');
                result.className = 'h-result';
                if (sub.status === '채점완료') {
                    result.textContent = `✅ ${sub.score}${sub.level ? ` (수준 ${sub.level})` : ''} — ${sub.feedback || ''}`;
                } else {
                    result.textContent = `⏳ ${sub.status || '채점대기'}`;
                }
                item.appendChild(result);

                body.appendChild(item);
            });

            document.getElementById('history-modal').classList.add('open');
        }

        document.getElementById('history-modal').addEventListener('click', (e) => {
            if (e.target.id === 'history-modal') e.target.classList.remove('open');
        });

        /* ═════════════════════════════════
           9. 표 그리기
        ═════════════════════════════════ */
        const expandedAnswers = new Set();   // 어떤 학생의 어떤 문항이 펼쳐져 있는지 기억

        function renderTable() {
            const tbody = document.getElementById('data-list');
            tbody.innerHTML = '';

            const keys = new Set([...Object.keys(sessions), ...Object.keys(evaluations)]);
            const rows = [];
            keys.forEach((key) => {
                const session = sessions[key] || null;
                const evalData = evaluations[key] || null;
                const info = (evalData && evalData.info) || session || {};
                const list = getSubmissionList(evalData);
                rows.push({ key, session, info, list, latest: list[list.length - 1] || null, count: list.length });
            });

            rows.sort((a, b) => {
                // ① 학년 → ② 반(숫자를 인식해 2반이 10반보다 앞) → ③ 번호 순으로 정렬
                const g = Number(a.info.grade || 0) - Number(b.info.grade || 0);
                if (g !== 0) return g;
                const c = String(a.info.class || '').localeCompare(String(b.info.class || ''), 'ko', { numeric: true });
                if (c !== 0) return c;
                return Number(a.info.number || 0) - Number(b.info.number || 0);
            });

            document.getElementById('total-count').textContent = rows.length;
            document.getElementById('submitted-count').textContent = rows.filter((r) => r.count > 0).length;
            document.getElementById('away-now-count').textContent =
                rows.filter((r) => r.session && r.session.focusState === 'away').length;
            document.getElementById('away-history-count').textContent =
                rows.filter((r) => r.session && Number(r.session.awayCount || 0) > 0).length;
            document.getElementById('pending-count').textContent = collectPending().length;

            if (rows.length === 0) {
                const tr = document.createElement('tr');
                tr.className = 'empty-row';
                const td = document.createElement('td');
                td.colSpan = 9;
                td.textContent = '아직 접속하거나 제출한 학생이 없습니다. 기다리는 중...';
                tr.appendChild(td);
                tbody.appendChild(tr);
                return;
            }

            rows.forEach(({ key, session, info, list, latest, count }) => {
                const tr = document.createElement('tr');
                if (session && session.focusState === 'away') tr.className = 'row-away';

                const g = makeCell(info.grade ? `${info.grade}학년` : '-');
                g.style.fontWeight = 'bold';
                tr.appendChild(g);
                tr.appendChild(makeCell(info.class || '-'));
                tr.appendChild(makeCell(info.number ? `${info.number}번` : '-'));
                tr.appendChild(makeCell(info.name || '-'));
                tr.appendChild(makeStatusLightCell(session));

                // 답안 칸: 문항별 토글 (기본은 접힌 상태 → 표가 깔끔해짐)
                const answerCell = document.createElement('td');
                answerCell.className = 'answer-cell';

                if (count === 0) {
                    answerCell.textContent = '아직 제출 전입니다.';
                } else {
                    // 문항 번호별로 가장 최근 답안만 추출 (같은 문항 재제출 시 최신 것)
                    const latestByQ = {};
                    list.forEach((sub) => { latestByQ[sub.questionNo || 1] = sub; });

                    Object.keys(latestByQ).map(Number).sort((a, b) => a - b).forEach((qn) => {
                        const sub = latestByQ[qn];
                        const tKey = `${key}::${qn}`;
                        const isOpen = expandedAnswers.has(tKey);

                        const toggle = document.createElement('button');
                        toggle.className = 'q-answer-toggle' + (isOpen ? ' open' : '');
                        toggle.textContent = `${isOpen ? '▾' : '▸'} 문항 ${qn} 답안 ${isOpen ? '접기' : '보기'}`;
                        toggle.addEventListener('click', () => {
                            isOpen ? expandedAnswers.delete(tKey) : expandedAnswers.add(tKey);
                            renderTable();
                        });
                        answerCell.appendChild(toggle);

                        if (isOpen) {
                            const body = document.createElement('div');
                            body.className = 'q-answer-body';
                            body.textContent = sub.answer || '';
                            answerCell.appendChild(body);
                        }
                    });

                    const badge = document.createElement('span');
                    badge.className = 'attempt-badge';
                    badge.textContent = `📚 총 ${count}회 제출 — 이력 보기`;
                    badge.addEventListener('click', () => openHistory(key, info.name || '학생'));
                    answerCell.appendChild(badge);
                }
                tr.appendChild(answerCell);

                // 채점 현황
                const statusCell = document.createElement('td');
                const sb = document.createElement('span');
                if (!latest) { sb.className = 'badge-none'; sb.textContent = '미제출'; }
                else if (latest.status === '채점완료') { sb.className = 'badge-done'; sb.textContent = '채점완료'; }
                else if (latest.status === '채점실패') { sb.className = 'badge-fail'; sb.textContent = '채점실패'; }
                else { sb.className = 'badge-wait'; sb.textContent = latest.status || '채점대기'; }
                statusCell.appendChild(sb);
                tr.appendChild(statusCell);

                // 점수 / 수준
                const scoreCell = makeCell(latest ? latest.score : '-', 'score-cell');
                if (latest && latest.level) {
                    const lv = document.createElement('span');
                    lv.className = 'level-badge';
                    lv.textContent = `수준 ${latest.level}`;
                    scoreCell.appendChild(document.createElement('br'));
                    scoreCell.appendChild(lv);
                }
                tr.appendChild(scoreCell);

                tr.appendChild(makeCell(latest ? latest.feedback : '-', 'feedback-cell'));
                tbody.appendChild(tr);
            });
        }
    </script>
</body>

</html>
